<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Globo · Buscador de ciudades</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.js"></script>
<style>
:root {
    --bg: #000;
    --fg: #fff;
    --accent: #ffe9a8;
}

* { box-sizing: border-box; }
html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

/* ---------------- Stage del mapa ----------------
   El canvas se extiende debajo de la viewport para que el globo,
   centrado dentro del canvas, quede visualmente cortado abajo.
   Su posición es FIJA — no se mueve al hacer una búsqueda; el
   marcador se reubica en el tope de la esfera vía coordenada
   geográfica calculada (ver computeResultCenterForTarget +
   CITY_LATITUDE_OFFSET en el script). */
#map-stage {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 180vh;
    z-index: 0;
}
#map {
    width: 100%;
    height: 100%;
    background: #000;
}

/* ---------------- Header ----------------
   Efecto "glass" (vidrio esmerilado): fondo semitransparente oscuro +
   backdrop-filter para difuminar lo que pasa por detrás (el globo).
   Mantenemos el mismo lenguaje visual que el search input y las cards
   para que toda la UI se sienta uniforme. */
.header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 22px 38px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
  /*  background: rgba(15, 15, 20, 0.32);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border-bottom: 1px solid rgba(255, 255, 255, 0.10);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);*/
}
.brand {
    font-size: 26px;
    letter-spacing: -0.01em;
    user-select: none;
    cursor: default;
}
.brand-light {
    font-weight: 300;
    color: #fff;
}
.brand-metal {
    font-weight: 800;
    letter-spacing: 0.08em;
    background: linear-gradient(180deg,
        #ffffff 0%,
        #d8d8d8 38%,
        #ffffff 52%,
        #8e8e8e 80%,
        #d0d0d0 100%);
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.15);
}
.nav-and-icons {
    display: flex;
    align-items: center;
    gap: 28px;
}
.nav {
    display: flex;
    gap: 38px;
}
.nav a {
    color: #fff;
    text-decoration: none;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    transition: color .15s;
}
.nav a:hover { color: var(--accent); }
.icons {
    display: flex;
    gap: 8px;
    margin-left: 12px;
    border-left: 1px solid rgba(255, 255, 255, 0.18);
    padding-left: 20px;
}
.icons button {
    background: transparent;
    border: none;
    color: #fff;
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color .15s, transform .15s;
}
.icons button:hover { color: var(--accent); transform: translateY(-1px); }
.icons svg {
    width: 22px;
    height: 22px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
}

@media (max-width: 720px) {
    .header { padding: 16px 18px; }
    .nav { display: none; }
}

/* ---------------- Hero tagline (sobre el search bar) ----------------
   Texto de marca que aparece arriba del input con una animación
   letter-by-letter: cada letra entra desde opacity:0 + blur + escala
   chica, y aterriza en opacity:1, sin blur, escala 1. El stagger entre
   letras se inyecta desde JS (animation-delay). */
#hero-tagline {
    position: fixed;
    top: 22%;                       /* arriba del search bar (que está en 30%) */
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    width: max-content;
    max-width: min(1180px, 94vw);
    text-align: center;
    color: rgba(255, 255, 255, 0.92);
    font-size: 31px;                /* 2x más grande que la primera versión */
    font-weight: 500;
    letter-spacing: 0.03em;
   
    pointer-events: none;
    user-select: none;
    text-shadow: 0 1px 14px rgba(0, 0, 0, 0.65);
    white-space: nowrap;
}
.hero-letter {
    display: inline-block;
    opacity: 0;
    filter: blur(14px);
    transform: scale(0.35);
    transform-origin: center center;
    animation: heroLetterIn 0.95s cubic-bezier(.2, .8, .25, 1) forwards;
    will-change: opacity, filter, transform;
}
/* Espacios: mantenerlos como espacios reales para que el navegador
   gestione el wrap; también necesitan tomar la animación para que el
   ancho del bloque sea estable durante la entrada. */
.hero-letter.space {
    width: 0.32em;
}
@keyframes heroLetterIn {
    0% {
        opacity: 0;
        filter: blur(14px);
        transform: scale(0.35);
    }
    60% {
        opacity: 1;
        filter: blur(2px);
        transform: scale(1.04);
    }
    100% {
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
    }
}
@media (max-width: 720px) {
    #hero-tagline {
        font-size: 22px;            /* 2x respecto a la primera versión mobile */
        letter-spacing: 0.18em;
        white-space: normal;        /* permite wrap en mobile */
        line-height: 1.25;
    }
}

/* ---------------- Search UI ----------------
   Subido al tercio alto del viewport. Con cards de 450 px, esto deja
   espacio suficiente entre la barra de búsqueda y la fila de cards
   (que ahora ocupa más alto del viewport). */
#search-wrap {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    width: min(540px, 90vw);
}
#search {
    width: 100%;
    background: rgb(46 46 46 / 4%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 999px;
    padding: 16px 26px;
    font-size: 15px;
    letter-spacing: 0.02em;
    outline: none;
  
    transition: border-color .2s, box-shadow .2s, background .2s;
}
#search::placeholder { color: rgba(255, 255, 255, 0.55); }
#search:focus {
    border-color: rgba(255, 233, 168, 0.45);
    background: rgba(255, 255, 255, 0.09);
    box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.55),
        0 0 30px rgba(255, 233, 168, 0.18);
}
/* Suggestions: posicionado en absoluto para no empujar las cards
   cuando aparece la lista debajo del input. */
#suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    margin-top: 8px;
    background: rgba(15, 15, 20, 0.55);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 18px;
    overflow: hidden;
    max-height: 320px;
    overflow-y: auto;
    display: none;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.55);
}
.suggestion {
    padding: 10px 18px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
}
.suggestion:hover, .suggestion.active {
    background: rgba(255, 233, 168, 0.12);
    color: var(--accent);
}
.suggestion .country {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.06em;
    text-transform: uppercase;
}

/* ---------------- Bottom controls (ocultos por defecto) ---------------- */
#controls { display: none; }

/* ---------------- Cards area (flechas + carrusel) ----------------
   Anclado a la parte baja del viewport pero subido un % para que el
   conjunto search + cards no quede pegado al footer. Ocupa todo el
   ancho para que el strip pueda desbordarse hacia la derecha cuando
   hay más cards de las que caben en pantalla. */
#cards-area {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 6vh;
    z-index: 4;
    pointer-events: none;
}

/* Fila de flechas: una a cada extremo del carrusel (izquierda al
   borde izquierdo, derecha al borde derecho), espejadas. Como el
   carrusel es infinito (siempre hay material a ambos lados), las
   flechas viven siempre visibles. */
#cards-arrows {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 0 38px;
    margin-bottom: 14px;
    pointer-events: none;
}
.arrow-btn {
    pointer-events: auto;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(15, 15, 20, 0.55);
    backdrop-filter: blur(12px) saturate(160%);
    -webkit-backdrop-filter: blur(12px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.18);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, color .15s, border-color .15s, transform .15s;
}
.arrow-btn:hover {
    background: rgba(255, 233, 168, 0.15);
    color: var(--accent);
    border-color: rgba(255, 233, 168, 0.45);
    transform: translateY(-1px);
}
.arrow-btn:active { transform: translateY(0) scale(0.96); }
.arrow-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
}

/* Strip horizontal de tarjetas (carrusel infinito):
   - #cards-strip es la "ventana" con overflow oculto que recorta lo que
     sobresale por izquierda/derecha. Su cursor por defecto es grab porque
     siempre hay loop (duplicamos el track) → siempre se puede arrastrar.
   - #cards-track es la fila real con todas las cards. Lo movemos con
     translateX desde JS (sin transición CSS) para auto-scroll continuo
     contra el sentido de la esfera + drag con inercia.
   - El "elástico" al presionar/soltar se hace animando la propiedad CSS
     `scale` del track (independiente del transform) con easing tipo
     spring (cubic-bezier con overshoot). De ahí el efecto "elastic". */
#cards-strip {
    pointer-events: auto;
    width: 100%;
    overflow: hidden;
    cursor: grab;
    user-select: none;
}
#cards-strip.dragging { cursor: grabbing; }

#cards-track {
    display: flex;
    gap: 32px;
    width: max-content;
    padding: 0 38px;
    will-change: transform, scale;
    transform-origin: center center;
    scale: 1;
    /* Easing tipo spring: el press/release "rebota" suave. */
    transition: scale .42s cubic-bezier(.18, .89, .32, 1.28);
}
#cards-strip.dragging #cards-track { scale: 0.96; }

.workshop-card {
    flex: 0 0 352px;            /* 320 × 1.10 = 352 (10% más grande) */
    height: 455px;              /* 450 × 1.10 = 495 */
    border-radius: 17px;
    overflow: hidden;
    /* Background semitransparente para que la esfera se transparente
       a través de la card. El backdrop-filter blur la "esmerila" para
       que el contenido detrás siga siendo visible pero suavizado. */
    background: rgba(0, 0, 0, 0.036);
    backdrop-filter: blur(14px) ;
    -webkit-backdrop-filter: blur(24px) ;
    border: 1px solid rgba(255, 255, 255, 0.12);
    /* Sombra suave proyectada bajo la card. Le da el "depth" / efecto de
       flotación sobre la esfera. Al hacer hover, el offset crece y aparece
       un halo dorado sutil. */
    box-shadow: 0 22px 60px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: transform .25s ease, border-color .25s, box-shadow .25s, background .25s;
}
.workshop-card:hover {
    transform: translateY(-8px);
    background: rgba(15, 15, 20, 0.5);
    border-color: rgba(255, 233, 168, 0.45);
    box-shadow: 0 28px 70px rgba(0, 0, 0, 0.75), 0 0 40px rgba(255, 233, 168, 0.15);
}
.workshop-card .cover {
    position: relative;
    height: 231px;              /* 210 × 1.10 = 231 */
    background-size: cover;
    background-position: center;
    background-color: #222;
}
.workshop-card .cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(15,15,20,0.85) 100%);
}
.workshop-card .tag {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.15);
}
.workshop-card .body {
    padding: 18px 20px 20px;
    color: #fff;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 12px;
}
.workshop-card .title {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.005em;
    color: #fff;
}
.workshop-card .meta {
    font-size: 12px;
    letter-spacing: 0.06em;
    color: rgba(255, 255, 255, 0.6);
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    gap: 3px;
}
.workshop-card .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.workshop-card .price {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.01em;
}
.workshop-card .price small {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    margin-left: 3px;
}
.workshop-card .cta {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.85);
    border-bottom: 1px solid rgba(255, 255, 255, 0.4);
    padding-bottom: 1px;
}

@media (max-width: 900px) {
    #cards-track  { padding: 0 18px; }
    #cards-arrows { padding: 0 18px; }
    #cards-area   { bottom: 5vh; }
    .workshop-card { flex-basis: 275px; height: 396px; }   /* 250→275, 360→396 (+10%) */
    .workshop-card .cover { height: 187px; }               /* 170 × 1.10 = 187 */
    .workshop-card .body  { padding: 14px 16px 16px; gap: 8px; }
    .workshop-card .title { font-size: 15px; }
    .workshop-card .meta  { font-size: 11px; }
    .workshop-card .price { font-size: 16px; }
}

/* ---------------- Glow marker ---------------- */
.glow-wrap {
    position: relative;
    width: 1px;
    height: 1px;
    pointer-events: none;
}
.glow, .glow-pulse {
    position: absolute;
    left: 50%;
    top: 50%;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}
.glow {
    width: 140px;
    height: 140px;
    background: radial-gradient(circle,
        rgba(255, 250, 220, 0.95) 0%,
        rgba(255, 220, 150, 0.55) 22%,
        rgba(255, 180, 110, 0.18) 45%,
        transparent 70%);
    filter: blur(8px);
    animation: breathe 2.8s ease-in-out infinite;
}
.glow-pulse {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle,
        rgba(255, 245, 200, 0.7) 0%,
        rgba(255, 200, 120, 0.2) 50%,
        transparent 70%);
    animation: pulse 2.8s ease-out infinite;
}
@keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
    50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
}
@keyframes pulse {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    20%  { opacity: 0.9; }
    100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
}

/* ---------------- City label ----------------
   .city-label es el elemento del marker: MapLibre le aplica el
   transform de posicionamiento, NO le toquemos `transform` desde CSS
   o le saldría volado. Toda la animación (fadeUp + opacity) se hace
   en .city-label-inner, que es un hijo "neutral". */
.city-label {
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 0 12px rgba(255, 220, 150, 0.9), 0 0 4px rgba(0, 0, 0, 0.9);
}
.city-label-inner {
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp .8s ease .4s forwards;
}
.city-label .city-name {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    line-height: 1;
}
.city-label .country-name {
    margin-top: 6px;
    color: rgba(255, 255, 255, 0.75);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.30em;
    text-transform: uppercase;
    line-height: 1;
}
@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}

/* ---------------- Oculto cualquier control nativo de atribución ---------------- */
.maplibregl-ctrl-attrib,
.maplibregl-ctrl-bottom-right .maplibregl-ctrl-attrib { display: none !important; }

/* ---------------- Atribución custom: solo un círculo con "i" ---------------- */
#attr-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    z-index: 1;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.55);
    color: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 14px;
    line-height: 24px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: background .15s, color .15s;
}
#attr-btn:hover {
    background: rgba(0, 0, 0, 0.8);
    color: var(--accent);
}
#attr-popup {
    position: absolute;
    bottom: 46px;
    right: 12px;
    z-index: 1;
    background: rgba(15, 15, 20, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.75);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 11px;
    max-width: 280px;
    display: none;
}
#attr-popup.show { display: block; }
#attr-popup a { color: var(--accent); text-decoration: none; }
#attr-popup a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="map-stage">
    <div id="map"></div>
</div>

<header class="header">
    <div class="brand">
        <span class="brand-light">Workshops</span><span class="brand-metal">TOURS</span>
    </div>

    <div class="nav-and-icons">
        <nav class="nav">
            <a href="#">All Workshops</a>
            <a href="#">Explore Region</a>
            <a href="#">Contact</a>
        </nav>
        <div class="icons">
            <button aria-label="Search">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.6" y1="16.6" x2="21" y2="21"/></svg>
            </button>
            <button aria-label="Account">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
            </button>
            <button aria-label="Cart">
                <svg viewBox="0 0 24 24"><path d="M4 7h16l-1.5 12h-13L4 7z"/><path d="M8 7a4 4 0 0 1 8 0"/></svg>
            </button>
        </div>
    </div>
</header>

<div id="hero-tagline" aria-hidden="true"></div>

<div id="search-wrap">
    <div id="search-border">
        <input id="search" type="text" placeholder="Search a city…" autocomplete="off">
    </div>
    <div id="suggestions"></div>
</div>  

<div id="cards-area">
    <div id="cards-arrows">
        <button class="arrow-btn" id="arrow-left" aria-label="Anterior" type="button">
            <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
        </button>
        <button class="arrow-btn" id="arrow-right" aria-label="Siguiente" type="button">
            <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
        </button>
    </div>
    <div id="cards-strip">
        <div id="cards-track"></div>
    </div>
</div>

<div id="controls">
    <button id="clear">Limpiar</button>
    <button id="toggle">Pausar</button>
    <label>Velocidad
        <input id="speed" type="range" min="1" max="40" value="6">
    </label>
</div>

<div id="attr-btn" title="Acerca del mapa">i</div>
<div id="attr-popup">
    © <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a>
    · <a href="https://openfreemap.org/" target="_blank">OpenFreeMap</a>
    · <a href="https://maplibre.org/" target="_blank">MapLibre</a>
</div>

<script>
    // ---------------- Workshops de ejemplo ----------------
    const workshops = [
        {
            tag: 'Photography',
            title: 'Patagonia Photo Expedition',
            location: 'El Chaltén, Argentina',
            date: 'Mar 15 – 22, 2026',
            price: '$2,890',
            city: 'Buenos Aires',
            image: 'https://images.unsplash.com/photo-1483347756197-71ef80e95f73?w=600&q=80'
        },
        {
            tag: 'Culinary',
            title: 'Tagines & Souks of Marrakech',
            location: 'Marrakech, Morocco',
            date: 'May 5 – 11, 2026',
            price: '$1,420',
            city: 'El Cairo',
            image: 'https://images.unsplash.com/photo-1539711757989-04ae22d9c34f?w=600&q=80'
        },
        {
            tag: 'Wellness',
            title: 'Bali Yoga & Ocean Retreat',
            location: 'Ubud, Indonesia',
            date: 'Apr 12 – 19, 2026',
            price: '$2,150',
            city: 'Singapur',
            image: 'https://images.unsplash.com/photo-1545205597-3d9d02c29597?w=600&q=80'
        },
        {
            tag: 'Adventure',
            title: 'Aurora Hunt & Hot Springs',
            location: 'Reykjavik, Iceland',
            date: 'Feb 8 – 14, 2027',
            price: '$3,250',
            city: 'Reikiavik',
            image: 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=600&q=80'
        },
        {
            tag: 'Coffee',
            title: 'Coffee Origins Immersion',
            location: 'Salento, Colombia',
            date: 'Jun 18 – 25, 2026',
            price: '$1,890',
            city: 'Lima',
            image: 'https://images.unsplash.com/photo-1559842474-d8d65bd47ae3?w=600&q=80'
        }
    ];

    // ---------------- Templates para resultados de búsqueda ----------------
    //  Cuando el usuario busca una ciudad, las cards se re-renderizan
    //  con 7 resultados "de esa ciudad" (los 5 que ya estaban + 2 más
    //  que se agregan a la derecha y se cortan si no entran en el viewport).
    //  Cada template define la categoría/precio/imagen y se completa con
    //  el nombre de la ciudad consultada.
    const SEARCH_CARD_TEMPLATES = [
        { tag: 'Photography',  titleSuffix: ' Streets & Skylines',   date: 'Mar 15 – 22, 2026', price: '$2,890', image: 'https://images.unsplash.com/photo-1480796927426-f609979314bd?w=600&q=80' },
        { tag: 'Culinary',     titleSuffix: ' Food & Markets',       date: 'May 5 – 11, 2026',  price: '$1,420', image: 'https://images.unsplash.com/photo-1539711757989-04ae22d9c34f?w=600&q=80' },
        { tag: 'Wellness',     titleSuffix: ' Wellness Retreat',     date: 'Apr 12 – 19, 2026', price: '$2,150', image: 'https://images.unsplash.com/photo-1545205597-3d9d02c29597?w=600&q=80' },
        { tag: 'Adventure',    titleSuffix: ' Hidden Adventures',    date: 'Feb 8 – 14, 2027',  price: '$3,250', image: 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=600&q=80' },
        { tag: 'Coffee',       titleSuffix: ' Coffee & Cafés',       date: 'Jun 18 – 25, 2026', price: '$1,890', image: 'https://images.unsplash.com/photo-1559842474-d8d65bd47ae3?w=600&q=80' },
        { tag: 'Architecture', titleSuffix: ' Architecture Walk',    date: 'Sep 4 – 11, 2026',  price: '$2,650', image: 'https://images.unsplash.com/photo-1483347756197-71ef80e95f73?w=600&q=80' },
        { tag: 'Art',          titleSuffix: ' Galleries & Museums',  date: 'Oct 18 – 24, 2026', price: '$2,180', image: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=600&q=80' }
    ];

    // ---------------- Helpers de render de cards ----------------
    //  El carrusel siempre es infinito: en cada renderCards(...) duplicamos
    //  el set para que al cruzar `stripSingleSetWidth` con el offset, el
    //  wrap sea visualmente imperceptible (el set 1 y el set 2 son idénticos
    //  y están exactamente a `stripSingleSetWidth` de distancia).
    const cardsStrip = document.getElementById('cards-strip');
    const cardsArea  = document.getElementById('cards-area');
    const cardsTrack = document.getElementById('cards-track');

    function buildCardsForCity(cityName) {
        const country = (cities.find(c => c.name === cityName) || {}).country || '';
        return SEARCH_CARD_TEMPLATES.map(t => ({
            tag: t.tag,
            title: cityName + t.titleSuffix,
            location: cityName + (country ? ', ' + country : ''),
            date: t.date,
            price: t.price,
            city: cityName,
            image: t.image
        }));
    }

    /**
     * Genera N cards aleatorias mezclando templates con ciudades distintas.
     * Es el set de "ejemplo" que llena el carrusel al abrir la página y al
     * cerrar un resultado. Usamos ciudades aleatorias evitando repetir hasta
     * agotar el catálogo (luego rota), para que cada card sea diferente.
     */
    function buildRandomCards(count) {
        const out = [];
        const used = new Set();
        const shuffledTemplates = SEARCH_CARD_TEMPLATES
            .map(t => [t, Math.random()])
            .sort((a, b) => a[1] - b[1])
            .map(([t]) => t);
        for (let i = 0; i < count; i++) {
            const t = shuffledTemplates[i % shuffledTemplates.length];
            let city = cities[Math.floor(Math.random() * cities.length)];
            let attempts = 0;
            while (used.has(city.name) && attempts < 8) {
                city = cities[Math.floor(Math.random() * cities.length)];
                attempts++;
            }
            used.add(city.name);
            if (used.size >= cities.length) used.clear();
            out.push({
                tag: t.tag,
                title: city.name + t.titleSuffix,
                location: city.name + ', ' + city.country,
                date: t.date,
                price: t.price,
                city: city.name,
                image: t.image
            });
        }
        return out;
    }

    let stripCardsCount    = 0;
    let stripSingleSetWidth = 0;

    function renderCards(cards) {
        stripCardsCount = cards.length;
        const cardHtml = w => `
            <article class="workshop-card" data-city="${w.city}">
                <div class="cover" style="background-image:url('${w.image}')">
                    <span class="tag">${w.tag}</span>
                </div>
                <div class="body">
                    <div>
                        <div class="title">${w.title}</div>
                        <div class="meta" style="margin-top:8px">
                            <span>${w.location}</span>
                            <span>${w.date}</span>
                        </div>
                    </div>
                    <div class="footer">
                        <div class="price">${w.price}<small>USD</small></div>
                        <div class="cta">Book</div>
                    </div>
                </div>
            </article>`;
        const setHtml = cards.map(cardHtml).join('');
        // Duplicamos el set para que el wrap (offset -= setWidth) no se vea.
        cardsTrack.innerHTML = setHtml + setHtml;

        // Reset del transporte
        stripOffset = 0;
        stripVelocity = STRIP_AUTO_SPEED;
        cardsTrack.style.transform = 'translate3d(0, 0, 0)';

        // El ancho exacto depende del CSS aplicado, así que medimos en el
        // siguiente frame.
        requestAnimationFrame(updateStripLayout);
    }

    /**
     * Calcula `stripSingleSetWidth` = ancho de un set de cards (sin duplicar)
     * incluyendo el gap entre cards y el gap "puente" hacia el siguiente set.
     * Con eso el wrap del offset es visualmente seamless.
     */
    function updateStripLayout() {
        const isMobile  = window.innerWidth <= 900;
        // Estos valores DEBEN coincidir con el CSS:
        //   .workshop-card { flex-basis: ... }  +  #cards-track { gap: ... }
        const cardWidth = isMobile ? 275 : 352;
        const gap       = 32;
        stripSingleSetWidth = stripCardsCount * (cardWidth + gap);
    }

    // En resize sólo recalculamos el ancho de un set (las cards reflowan solas).
    let layoutRaf = null;
    window.addEventListener('resize', () => {
        if (layoutRaf) cancelAnimationFrame(layoutRaf);
        layoutRaf = requestAnimationFrame(updateStripLayout);
    });

    // ---------------- Estado del carrusel ----------------
    //  El strip se desplaza vía translateX con un único `stripOffset`
    //  (en px). El movimiento por frame es:
    //    stripOffset += stripVelocity * dt
    //  Cuando NO hay drag, `stripVelocity` decae exponencialmente hacia
    //  STRIP_AUTO_SPEED (positivo, sentido contrario a la esfera). Así un
    //  fling del usuario o un click de flecha se funde con el auto-scroll
    //  base sin saltos.
    //
    //  Dirección: la esfera gira con `center.lng -= ...` → desde el
    //  observador, su superficie se mueve de IZQUIERDA a DERECHA. Para que
    //  el carrusel rote en sentido contrario, las cards deben moverse de
    //  DERECHA a IZQUIERDA, lo que corresponde a `stripOffset` creciente.
    //  Por eso STRIP_AUTO_SPEED es positivo.
    const STRIP_AUTO_SPEED   = 12;    // px/s, muy lento pero perceptible
    const STRIP_INERTIA_TAU  = 0.55;  // s, decay del fling hacia el baseline
    const STRIP_MAX_VELOCITY = 1800;  // px/s, tope tras un fling fuerte
    const STRIP_ARROW_IMPULSE = 600;  // px/s, ~1 card por click de flecha

    let stripOffset   = 0;
    let stripVelocity = STRIP_AUTO_SPEED;

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // Cantidad de cards aleatorias que llenan el carrusel al cargar y al
    // cerrar un resultado de búsqueda. Suficientes para que el loop sea
    // visualmente "infinito" sin repeticiones obvias.
    const RANDOM_INITIAL_CARDS = 14;

    // ---------------- Datos de ejemplo ----------------
    const cities = [
        { name: 'Buenos Aires', country: 'Argentina', coords: [-58.3816, -34.6037] },
        { name: 'Tokio',        country: 'Japón',      coords: [139.6917, 35.6895] },
        { name: 'Nueva York',   country: 'EE.UU.',     coords: [-74.0060, 40.7128] },
        { name: 'Londres',      country: 'Reino Unido',coords: [-0.1276, 51.5074] },
        { name: 'París',        country: 'Francia',    coords: [2.3522, 48.8566] },
        { name: 'Sídney',       country: 'Australia',  coords: [151.2093, -33.8688] },
        { name: 'Mumbai',       country: 'India',      coords: [72.8777, 19.0760] },
        { name: 'El Cairo',     country: 'Egipto',     coords: [31.2357, 30.0444] },
        { name: 'Río de Janeiro',country:'Brasil',     coords: [-43.1729, -22.9068] },
        { name: 'Moscú',        country: 'Rusia',      coords: [37.6173, 55.7558] },
        { name: 'Pekín',        country: 'China',      coords: [116.4074, 39.9042] },
        { name: 'Ciudad del Cabo',country: 'Sudáfrica',coords: [18.4241, -33.9249] },
        { name: 'Los Ángeles',  country: 'EE.UU.',     coords: [-118.2437, 34.0522] },
        { name: 'Ciudad de México',country:'México',   coords: [-99.1332, 19.4326] },
        { name: 'Berlín',       country: 'Alemania',   coords: [13.4050, 52.5200] },
        { name: 'Madrid',       country: 'España',     coords: [-3.7038, 40.4168] },
        { name: 'Estambul',     country: 'Turquía',    coords: [28.9784, 41.0082] },
        { name: 'Bangkok',      country: 'Tailandia',  coords: [100.5018, 13.7563] },
        { name: 'Singapur',     country: 'Singapur',   coords: [103.8198, 1.3521] },
        { name: 'Dubái',        country: 'EAU',        coords: [55.2708, 25.2048] },
        { name: 'Toronto',      country: 'Canadá',     coords: [-79.3832, 43.6532] },
        { name: 'Lima',         country: 'Perú',       coords: [-77.0428, -12.0464] },
        { name: 'Reikiavik',    country: 'Islandia',   coords: [-21.9426, 64.1466] },
        { name: 'Atenas',       country: 'Grecia',     coords: [23.7275, 37.9838] }
    ];

    // ---------------- Mapa ----------------
    const DEFAULT_CENTER = [20, 25];

    // Pose inicial: la esfera entra "grande" en el viewport (cortada arriba
    // y abajo, como en el mockup), no se ve completa. El pitch se mantiene
    // suave para conservar un tilt sutil sin distorsionar.
    //
    // Si después se necesitara afinar visualmente, las dos perillas son:
    //   - DEFAULT_ZOOM ↑ → esfera más grande / más cortada
    //   - #map-stage height/top → desplaza el centro vertical de la esfera
    const DEFAULT_ZOOM    = 3.87;
    const DEFAULT_PITCH   = 10;
    const DEFAULT_BEARING = 0;

    // Pose al ejecutar una búsqueda: la esfera queda EXACTAMENTE igual
    // que al cargar la página. Mismo zoom y mismo pitch que el default;
    // lo único que cambia es el centro geográfico (corrimiento al sur
    // del marcador) para que la ciudad aterrice arriba de la esfera.
    const RESULT_ZOOM     = DEFAULT_ZOOM;
    const RESULT_PITCH    = DEFAULT_PITCH;

    // ---------------- Posicionamiento del resultado ----------------
    //
    //  Cuando el usuario busca una ciudad, queremos que SIEMPRE termine
    //  en el mismo lugar de la pantalla — sin importar si es Berlín,
    //  Buenos Aires, Reikiavik, Sídney o El Cairo. Y con la esfera
    //  exactamente del mismo tamaño y en la misma posición que al cargar.
    //
    //  El truco: usar un offset ANGULAR en grados de latitud — el centro
    //  de la cámara se ubica `CITY_LATITUDE_OFFSET` grados al SUR de la
    //  ciudad. En proyección globo (que MapLibre maneja con un proyector
    //  cercano al ortográfico), una diferencia angular fija entre dos
    //  latitudes se traduce SIEMPRE a la misma distancia en pantalla —
    //  independientemente de si la ciudad está en el norte o el sur, en
    //  el ecuador o cerca de los polos.
    //
    //  ¿Por qué no calcular el centro con unproject sobre el píxel
    //  destino del viewport (más "exacto" en teoría)?
    //    Probado y descartado: para ciudades suficientemente lejanas del
    //    centro por defecto (caso típico Buenos Aires), el "píxel espejo"
    //    que necesitamos unprojectar cae FUERA de la silueta visible del
    //    globo, en el espacio negro alrededor. MapLibre en ese caso
    //    devuelve coordenadas basura cerca de un polo — el cálculo pasa
    //    cualquier validación numérica pero geográficamente es inútil, y
    //    la cámara termina apuntando al polo sur (o un punto raro), con
    //    la esfera viéndose completamente distinta. El offset angular
    //    fijo evita ese problema por completo: no depende de la geometría
    //    visible del canvas, sólo del modelo angular del globo.
    //
    //  Perilla:
    //    ↑ valor mayor → marcador más cerca del borde superior
    //    ↓ valor menor → marcador más cerca del centro de la esfera
    //  Depende del zoom: si subís RESULT_ZOOM, bajalo (y viceversa).
    const CITY_LATITUDE_OFFSET = 15;

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: DEFAULT_CENTER,
        zoom: DEFAULT_ZOOM,
        pitch: DEFAULT_PITCH,
        bearing: DEFAULT_BEARING,
        attributionControl: false,
        // Zoom de usuario completamente bloqueado: ni rueda, ni doble click,
        // ni shift+drag, ni pinch en touch. El zoom sólo lo controla el
        // código (flyTo al buscar, easeTo al volver al globo). Así la esfera
        // siempre se ve al mismo tamaño en la pose por defecto.
        scrollZoom: false,
        doubleClickZoom: false,
        boxZoom: false,
        touchZoomRotate: false,
        // Desactivamos la inercia nativa de MapLibre para que NO compita
        // con nuestra propia inercia (la que se funde con el autorotate).
        dragPan: { deceleration: 99999 }
    });

    // La esfera no muestra NINGÚN texto del estilo (ni países, ni ciudades,
    // ni calles, ni POIs). El único texto que aparece es el marcador
    // dinámico que renderizamos al buscar una ciudad (city + country).

    // ============================================================
    //  Cálculo del centro de cámara para una búsqueda
    // ============================================================
    //  Dado un `target` (lng, lat), devuelve el centro de cámara que hay
    //  que pasar al easeTo para que el target aterrice en el "tope" de la
    //  esfera (~11% desde arriba en el viewport, calibrado con el zoom y
    //  pitch por defecto).
    //
    //  Es deliberadamente simple: offset angular en latitud. Sin unproject,
    //  sin estados temporales, sin dependencia de la geometría visible del
    //  canvas. En proyección globo, este offset SIEMPRE se traduce a la
    //  misma distancia en pantalla para cualquier ciudad — Berlín y
    //  Buenos Aires aterrizan en el mismo Y.
    //
    //  Si más adelante se cambia RESULT_ZOOM o se quiere otra posición
    //  en el viewport, sólo se toca `CITY_LATITUDE_OFFSET`.
    function computeResultCenterForTarget(target) {
        return [target[0], target[1] - CITY_LATITUDE_OFFSET];
    }

    map.on('load', () => {
        map.setProjection({ type: 'globe' });

        // Ocultamos TODAS las capas de tipo symbol del estilo,
        // permanentemente — no se re-muestran a ningún zoom.
        map.getStyle().layers
            .filter(l => l.type === 'symbol')
            .forEach(l => map.setLayoutProperty(l.id, 'visibility', 'none'));

        // Atmósfera / espacio negro
        map.setSky({
            'sky-color': '#000000',
            'horizon-color': '#0a0a18',
            'fog-color': '#000000',
            'sky-horizon-blend': 0.02,
            'horizon-fog-blend': 0.1,
            'fog-ground-blend': 0.0,
            'atmosphere-blend': 0.5
        });
    });

    // ============================================================
    //  Rotación + inercia
    // ============================================================
    //  Reglas de negocio:
    //  • La esfera SIEMPRE está rotando salvo que el usuario esté
    //    arrastrando, que haya una ciudad enfocada (RESULT_ZOOM, búsqueda
    //    activa) o que esté corriendo una animación programada. Como el
    //    zoom del usuario está deshabilitado, no necesitamos un umbral
    //    por nivel de zoom: el spin no se detiene "por estar cerca".
    //  • La inercia de un "fling" del mouse se funde directamente en la
    //    velocidad del autorotate, que luego decae suavemente a la
    //    velocidad elegida en el slider. No hay pausas ni delays.
    // ------------------------------------------------------------

    // Velocidad máxima permitida tras un fling muy fuerte (°/s).
    const MAX_SPIN = 240;

    // Tiempo característico (s) con el que `currentSpinSpeed` decae
    // exponencialmente hacia `degreesPerSecond`. Mayor = la inercia del
    // fling se siente más larga.
    const INERTIA_TAU = 2.5;

    // Estado
    let degreesPerSecond  = 6;                  // velocidad "deseada" (slider)
    let currentSpinSpeed  = degreesPerSecond;   // velocidad actual (mutada por el fling)
    let spinning          = true;               // botón pausar/reanudar global
    let lastFrameTs       = null;

    let userDragging      = false;              // mouse o dedo apretado/arrastrando
    let mapAnimating      = false;              // hay un flyTo/easeTo en curso

    // ---- Captura de velocidad mientras arrastra ----
    let lastDragLng = null;
    let lastDragTs = null;
    let velocitySamples = [];

    function recordSample(v) {
        velocitySamples.push(v);
        if (velocitySamples.length > 5) velocitySamples.shift();
    }
    function avgVelocity() {
        if (!velocitySamples.length) return 0;
        return velocitySamples.reduce((s, v) => s + v, 0) / velocitySamples.length;
    }

    function startDrag() {
        userDragging = true;
        lastDragLng = map.getCenter().lng;
        lastDragTs = performance.now();
        velocitySamples = [];
    }
    function endDrag() {
        if (!userDragging) return;
        userDragging = false;
        const v = avgVelocity();
        if (Math.abs(v) > 0.5) {
            // El usuario lanzó el globo. Su velocidad angular pasa a ser la
            // velocidad del autorotate, que luego decae al valor por defecto.
            // Signo invertido: nuestro autorotate hace center.lng -= speed * dt,
            // así que un fling que aumenta lng requiere speed negativa.
            currentSpinSpeed = -v;
            currentSpinSpeed = Math.max(-MAX_SPIN, Math.min(MAX_SPIN, currentSpinSpeed));
        }
        lastDragLng = null;
        lastDragTs = null;
    }

    map.on('mousedown', startDrag);
    map.on('touchstart', startDrag);
    map.on('mouseup', endDrag);
    map.on('touchend', endDrag);

    map.on('move', () => {
        if (!userDragging) return;
        const now = performance.now();
        const lng = map.getCenter().lng;
        if (lastDragLng !== null && lastDragTs !== null) {
            const dt = (now - lastDragTs) / 1000;
            if (dt > 0) {
                let dLng = lng - lastDragLng;
                if (dLng > 180) dLng -= 360;
                if (dLng < -180) dLng += 360;
                recordSample(dLng / dt);
            }
        }
        lastDragLng = lng;
        lastDragTs = now;
    });

    // ------------------------------------------------------------
    //  Zoom con la rueda SÓLO si se aprieta Ctrl (Win/Linux) o Cmd (Mac)
    // ------------------------------------------------------------
    //  En la config del Map dejamos `scrollZoom: false`, así que la rueda
    //  sin modificador no hace nada. Acá registramos un listener nativo
    //  que actúa únicamente cuando el usuario tiene Ctrl o Cmd apretado.
    //  Bonus: el pinch del trackpad de Mac también dispara wheel events
    //  con ctrlKey=true (lo simula el navegador), así que el gesto de
    //  pellizco también hace zoom — esperable.
    //
    //  preventDefault() es importante: en Chrome/Edge, Ctrl+wheel hace
    //  "zoom de página" por defecto; lo cancelamos para que el efecto
    //  sólo sea sobre el mapa.
    const ZOOM_WHEEL_SENSITIVITY = 0.0025;   // px de deltaY → unidades de zoom
    const ZOOM_EASE_DURATION_MS  = 120;      // animación corta tras cada tick
    map.getCanvasContainer().addEventListener('wheel', (e) => {
        if (!(e.ctrlKey || e.metaKey)) return;
        e.preventDefault();
        e.stopPropagation();
        // deltaY > 0 ⇒ rueda hacia abajo / pinch-out ⇒ alejar (zoom out).
        // deltaY < 0 ⇒ rueda hacia arriba / pinch-in  ⇒ acercar (zoom in).
        const dz = -e.deltaY * ZOOM_WHEEL_SENSITIVITY;
        map.easeTo({
            zoom: map.getZoom() + dz,
            duration: ZOOM_EASE_DURATION_MS,
            essential: true
        });
    }, { passive: false });

    /**
     * Decide si el auto-giro está permitido en este frame.
     * Se pausa si el usuario está interactuando, si hay una ciudad enfocada,
     * o si hay una animación programada en curso. Sin restricción de zoom:
     * el zoom del usuario está deshabilitado y el del programa (flyTo a una
     * ciudad) ya está cubierto por `activeResult`/`mapAnimating`.
     */
    function isAutoSpinAllowed() {
        if (!spinning)          return false;
        if (userDragging)       return false;
        if (activeResult)       return false;
        if (mapAnimating)       return false;
        return true;
    }

    function frame(ts) {
        if (lastFrameTs === null) lastFrameTs = ts;
        const dt = (ts - lastFrameTs) / 1000;
        lastFrameTs = ts;

        if (isAutoSpinAllowed()) {
            // Decaimiento exponencial de la velocidad del fling
            // hacia la velocidad elegida en el slider.
            const k = Math.min(1, dt / INERTIA_TAU);
            currentSpinSpeed += (degreesPerSecond - currentSpinSpeed) * k;

            const center = map.getCenter();
            center.lng -= currentSpinSpeed * dt;
            map.jumpTo({ center });
        }

        // ---------------- Strip: auto-scroll + inercia post-fling ----------------
        //  Mientras NO se está arrastrando, la velocidad del strip se mueve
        //  exponencialmente hacia STRIP_AUTO_SPEED. Si el usuario lanzó un
        //  fling, su velocidad inicial es alta y va decayendo al baseline,
        //  fundiendo el "tirón" con el auto-rotación contraria a la esfera.
        if (!cardDragActive) {
            const ks = Math.min(1, dt / STRIP_INERTIA_TAU);
            stripVelocity += (STRIP_AUTO_SPEED - stripVelocity) * ks;
            stripOffset   += stripVelocity * dt;
        }
        // Wrap infinito del offset: como duplicamos el set, restar/sumar el
        // ancho de un set deja la imagen idéntica → no se nota el salto.
        if (stripSingleSetWidth > 0) {
            while (stripOffset >= stripSingleSetWidth) stripOffset -= stripSingleSetWidth;
            while (stripOffset < 0)                    stripOffset += stripSingleSetWidth;
        }
        cardsTrack.style.transform = `translate3d(${-stripOffset}px, 0, 0)`;

        requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ---------------- Búsqueda ----------------
    const input        = document.getElementById('search');
    const suggestions  = document.getElementById('suggestions');
    const toggleBtn    = document.getElementById('toggle');
    const clearBtn     = document.getElementById('clear');
    const speedInput   = document.getElementById('speed');

    let activeIndex = -1;
    let activeResult = null;     // { glowMarker, labelMarker, city }

    function renderSuggestions(q) {
        if (!q) { suggestions.style.display = 'none'; return; }
        const norm = q.toLowerCase().trim();
        const matches = cities
            .filter(c => c.name.toLowerCase().includes(norm))
            .slice(0, 8);
        if (!matches.length) { suggestions.style.display = 'none'; return; }
        suggestions.innerHTML = matches.map((c, i) => `
            <div class="suggestion ${i === activeIndex ? 'active' : ''}" data-name="${c.name}">
                <span>${c.name}</span>
                <span class="country">${c.country}</span>
            </div>
        `).join('');
        suggestions.style.display = 'block';
    }

    input.addEventListener('input', () => {
        activeIndex = -1;
        renderSuggestions(input.value);
    });

    input.addEventListener('keydown', (e) => {
        const items = suggestions.querySelectorAll('.suggestion');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIndex = Math.min(activeIndex + 1, items.length - 1);
            renderSuggestions(input.value);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIndex = Math.max(activeIndex - 1, 0);
            renderSuggestions(input.value);
        } else if (e.key === 'Enter') {
            e.preventDefault();
            const chosenName = items[activeIndex]?.dataset.name
                || items[0]?.dataset.name
                || cities.find(c => c.name.toLowerCase() === input.value.toLowerCase().trim())?.name;
            if (chosenName) selectCity(chosenName);
        } else if (e.key === 'Escape') {
            clearResult();
        }
    });

    suggestions.addEventListener('click', (e) => {
        const item = e.target.closest('.suggestion');
        if (item) selectCity(item.dataset.name);
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('#search-wrap')) suggestions.style.display = 'none';
    });

    // ---------------- Resultado: rotación + luz + label ----------------
    //
    //  La búsqueda hace un `easeTo` (NO un flyTo): misma pose visual que
    //  el estado por defecto — mismo zoom y mismo pitch — y la cámara
    //  rota suavemente hasta una coordenada calculada para que la ciudad
    //  aterrice SIEMPRE en el mismo punto de la pantalla. Como zoom y
    //  pitch finales son IGUALES a los actuales, easeTo los mantiene
    //  constantes durante toda la animación: la esfera ni se achica ni
    //  se agranda ni se desplaza — sólo rota para mostrar la ciudad
    //  arriba. Que es exactamente lo que se ve al cargar la página,
    //  apenas con otro contenido visible.
    //
    //  El cálculo del centro se delega a `computeResultCenterForTarget`,
    //  que devuelve `[target_lng, target_lat - CITY_LATITUDE_OFFSET]`:
    //  un offset angular en latitud que en globo se traduce a una
    //  distancia constante en pantalla para cualquier ciudad.
    //
    //  Ver constantes: CITY_LATITUDE_OFFSET, RESULT_ZOOM, RESULT_PITCH.

    function selectCity(name) {
        const city = cities.find(c => c.name === name);
        if (!city) return;

        input.value = city.name;
        suggestions.style.display = 'none';

        // Pequeño offset aleatorio para que NO sea exactamente la coord oficial
        const jitter = () => (Math.random() - 0.5) * 0.6;
        const target = [city.coords[0] + jitter(), city.coords[1] + jitter()];

        clearResult(false);  // limpio el anterior sin reanudar giro

        activeResult = { city, target };

        // Re-renderizamos el strip con 7 cards "de esta ciudad"
        // (los 5 originales + 2 más, que se desbordan a la derecha
        // si no entran en el viewport).
        renderCards(buildCardsForCity(city.name));

        // Bearing fijo en 0 (norte arriba) para garantizar que la ciudad
        // quede HORIZONTALMENTE CENTRADA. Si rotáramos el bearing, el
        // marcador se desplazaría hacia los lados.
        const bearing = 0;

        // El marcador (`target`) se queda en su coordenada real. El
        // CENTRO del mapa se calcula con un offset angular en latitud
        // (ver `computeResultCenterForTarget`), que en proyección globo
        // se traduce a una distancia consistente en pantalla para
        // CUALQUIER ciudad — sin importar latitud (norte/sur/cerca de
        // polos) ni la geometría visible del canvas.
        const mapCenter = computeResultCenterForTarget(target);

        mapAnimating = true;
        // ¿Por qué easeTo y no flyTo?
        //   flyTo simula un "vuelo de avión": durante el medio del trayecto
        //   sube el camera por encima del globo (zoom out) y después
        //   desciende al destino (zoom in). Para una ciudad cercana al
        //   centro por defecto (ej. Berlín) eso casi no se nota, pero para
        //   destinos lejanos (Buenos Aires, Sídney, etc.) la esfera se
        //   achica drásticamente a mitad de la animación y reaparece
        //   grande al final — daba la sensación de que "el zoom y el
        //   tamaño cambiaban" y de que la esfera "se salía del viewport".
        //
        //   easeTo interpola directamente entre estado actual y destino,
        //   sin esa "altitud intermedia". Como el zoom y el pitch finales
        //   son los mismos que los actuales, easeTo los mantiene
        //   CONSTANTES durante toda la animación → la esfera no cambia
        //   de tamaño ni de posición, sólo rota para que la ciudad quede
        //   arriba. Que es exactamente lo que se pidió.
        //
        //   Duración fija para que la animación se sienta igual sin
        //   importar la distancia (cerca o lejos → mismo tiempo).
        map.easeTo({
            center: mapCenter,
            zoom: RESULT_ZOOM,
            pitch: RESULT_PITCH,
            bearing: bearing,
            duration: 1500,
            essential: true
        });

        map.once('moveend', () => {
            mapAnimating = false;
            if (!activeResult) return;

            const glowEl = document.createElement('div');
            glowEl.className = 'glow-wrap';
            glowEl.innerHTML = '<div class="glow"></div><div class="glow-pulse"></div>';
            const glowMarker = new maplibregl.Marker({ element: glowEl })
                .setLngLat(target)
                .addTo(map);

            const labelEl = document.createElement('div');
            labelEl.className = 'city-label';
            // IMPORTANTE: la animación de fadeUp se aplica a un .city-label-inner
            // y NO al elemento raíz del marker. MapLibre setea `transform` en la
            // raíz para posicionarlo en lat/lng; si la keyframe también animara
            // `transform` en la raíz, lo sobrescribiría y el label volaría al
            // top-left del contenedor.
            labelEl.innerHTML = `
                <div class="city-label-inner">
                    <div class="city-name">${city.name}</div>
                    <div class="country-name">${city.country}</div>
                </div>
            `;
            const labelMarker = new maplibregl.Marker({
                element: labelEl,
                anchor: 'top',
                offset: [0, 60]
            })
                .setLngLat(target)
                .addTo(map);

            activeResult.glowMarker  = glowMarker;
            activeResult.labelMarker = labelMarker;
        });
    }

    function clearResult(resumeSpin = true) {
        if (activeResult) {
            activeResult.glowMarker?.remove();
            activeResult.labelMarker?.remove();
            activeResult = null;
        }
        if (resumeSpin) {
            input.value = '';
            activeIndex = -1;
            suggestions.innerHTML = '';
            suggestions.style.display = 'none';
            input.blur();

            // Restauramos un set aleatorio fresco para el carrusel infinito.
            renderCards(buildRandomCards(RANDOM_INITIAL_CARDS));

            // Reset al estado inicial EXACTO con el que abre la página
            currentSpinSpeed = degreesPerSecond;
            mapAnimating = true;
            map.easeTo({
                center: DEFAULT_CENTER,
                pitch: DEFAULT_PITCH,
                bearing: DEFAULT_BEARING,
                zoom: DEFAULT_ZOOM,
                duration: 1800,
                essential: true
            });
            map.once('moveend', () => { mapAnimating = false; });
        }
    }

    // ---------------- Botones ----------------
    toggleBtn.addEventListener('click', () => {
        spinning = !spinning;
        toggleBtn.textContent = spinning ? 'Pausar' : 'Reanudar';
    });
    clearBtn.addEventListener('click', () => clearResult(true));
    speedInput.addEventListener('input', (e) => {
        degreesPerSecond = Number(e.target.value);
    });

    // ---------------- Render inicial de cards ----------------
    //  Vista por defecto = un set de cards aleatorias suficientemente largo
    //  para alimentar el carrusel infinito. Al buscar una ciudad,
    //  selectCity() reemplaza el set por los resultados contextuales de esa
    //  ciudad (también en loop). Al cerrar el resultado se vuelve a generar
    //  un set aleatorio nuevo, así no es siempre exactamente el mismo.
    renderCards(buildRandomCards(RANDOM_INITIAL_CARDS));

    // ---------------- Hero tagline (entrada letter-by-letter) ----------------
    //  Generamos un <span> por carácter (los espacios se renderizan como
    //  spans vacíos con clase .space para mantener el ancho). Cada span
    //  recibe un `animation-delay` escalonado para que las letras entren
    //  una detrás de la otra (efecto stagger). El keyframe heroLetterIn
    //  hace el trabajo visual: opacity 0→1, blur 14px→0, scale 0.35→1
    //  con un pequeño overshoot a 1.04 antes de aterrizar.
    (function injectHeroTagline() {
        const HERO_TEXT = 'Create with artist in they private studio worldwide';
        const HERO_STAGGER_MS = 38;     // ms entre el inicio de letra y letra
        const HERO_INITIAL_DELAY_MS = 250;

        const host = document.getElementById('hero-tagline');
        if (!host) return;

        const chars = Array.from(HERO_TEXT);
        host.innerHTML = chars.map((ch, i) => {
            const isSpace = ch === ' ';
            const delay = (HERO_INITIAL_DELAY_MS + i * HERO_STAGGER_MS) / 1000;
            const cls = 'hero-letter' + (isSpace ? ' space' : '');
            const content = isSpace ? '' : ch;
            return `<span class="${cls}" style="animation-delay:${delay.toFixed(3)}s">${content}</span>`;
        }).join('');
    })();

    // ---------------- Drag del strip (con inercia + elastic press/release) -------
    //  • Al apretar: clase .dragging → el track se escala a 0.96 con easing
    //    tipo spring (overshoot). Da la sensación elástica de "presionar".
    //  • Al mover: se actualiza stripOffset directamente. No hay rubber
    //    band en los bordes porque el carrusel es infinito (loop seamless).
    //  • Al soltar: tomamos la velocidad media de las últimas muestras del
    //    cursor y la usamos como velocidad inicial del strip (fling). El
    //    decaimiento exponencial en frame() la lleva de vuelta al baseline.
    //  • La clase .dragging se quita al soltar → scale vuelve a 1 con el
    //    mismo easing spring (rebote sutil de soltar).
    const DRAG_CLICK_THRESHOLD = 5;
    const STRIP_DRAG_VELOCITY_SAMPLES = 5;

    let cardDragActive       = false;
    let cardDragStartX       = 0;
    let cardDragStartOffset  = 0;
    let cardDragMoved        = false;
    let cardDragLastX        = 0;
    let cardDragLastTs       = 0;
    let cardDragVelocitySamples = [];

    function recordDragVelocitySample(dx, dt) {
        if (dt <= 0) return;
        cardDragVelocitySamples.push(dx / dt);
        if (cardDragVelocitySamples.length > STRIP_DRAG_VELOCITY_SAMPLES) {
            cardDragVelocitySamples.shift();
        }
    }
    function avgDragVelocity() {
        if (!cardDragVelocitySamples.length) return 0;
        return cardDragVelocitySamples.reduce((s, v) => s + v, 0) / cardDragVelocitySamples.length;
    }

    cardsStrip.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        cardDragActive       = true;
        cardDragMoved        = false;
        cardDragStartX       = e.clientX;
        cardDragStartOffset  = stripOffset;
        cardDragLastX        = e.clientX;
        cardDragLastTs       = performance.now();
        cardDragVelocitySamples = [];
        cardsStrip.classList.add('dragging');
        try { cardsStrip.setPointerCapture(e.pointerId); } catch (_) {}
    });

    cardsStrip.addEventListener('pointermove', (e) => {
        if (!cardDragActive) return;
        const now = performance.now();
        const dx  = e.clientX - cardDragStartX;
        if (Math.abs(dx) > DRAG_CLICK_THRESHOLD) cardDragMoved = true;
        // Cursor a la derecha (dx > 0) ⇒ track se mueve a la derecha ⇒ offset baja.
        stripOffset = cardDragStartOffset - dx;

        const dxFrame = e.clientX - cardDragLastX;
        const dtFrame = (now - cardDragLastTs) / 1000;
        recordDragVelocitySample(dxFrame, dtFrame);
        cardDragLastX  = e.clientX;
        cardDragLastTs = now;
    });

    function endCardDrag(e) {
        if (!cardDragActive) return;
        cardDragActive = false;
        cardsStrip.classList.remove('dragging');
        if (e && e.pointerId !== undefined) {
            try { cardsStrip.releasePointerCapture(e.pointerId); } catch (_) {}
        }
        // Convertimos px/s del cursor a px/s del offset (signo opuesto).
        const v = avgDragVelocity();
        if (Math.abs(v) > 80) {
            stripVelocity = clamp(-v, -STRIP_MAX_VELOCITY, STRIP_MAX_VELOCITY);
        } else {
            stripVelocity = STRIP_AUTO_SPEED;
        }
        cardDragVelocitySamples = [];
    }
    cardsStrip.addEventListener('pointerup', endCardDrag);
    cardsStrip.addEventListener('pointercancel', endCardDrag);

    // El click se dispara en pointerup. Si hubo drag real, lo cancelamos
    // en fase de captura para que la selección de ciudad no se ejecute.
    cardsStrip.addEventListener('click', (e) => {
        if (cardDragMoved) {
            e.preventDefault();
            e.stopPropagation();
            cardDragMoved = false;
            return;
        }
        const card = e.target.closest('.workshop-card');
        if (!card) return;
        const cityName = card.dataset.city;
        if (cityName) selectCity(cityName);
    }, true);

    // ---------------- Flechas de navegación ----------------
    //  Cada click inyecta un impulso de velocidad al strip. La inercia en
    //  frame() lo lleva de vuelta a STRIP_AUTO_SPEED, así que el avance se
    //  siente "soft": acelera y vuelve solo al ritmo del auto-scroll.
    //  Con τ = STRIP_INERTIA_TAU ≈ 0.55s el desplazamiento extra ronda
    //  (impulso - baseline) * τ ≈ 320 px ≈ una tarjeta + gap.
    const arrowLeftBtn  = document.getElementById('arrow-left');
    const arrowRightBtn = document.getElementById('arrow-right');

    arrowLeftBtn.addEventListener('click', () => {
        stripVelocity = -STRIP_ARROW_IMPULSE;
    });
    arrowRightBtn.addEventListener('click', () => {
        stripVelocity = STRIP_ARROW_IMPULSE;
    });

    // Atribución custom: toggle del popup
    const attrBtn = document.getElementById('attr-btn');
    const attrPopup = document.getElementById('attr-popup');
    attrBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        attrPopup.classList.toggle('show');
    });
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#attr-popup') && !e.target.closest('#attr-btn')) {
            attrPopup.classList.remove('show');
        }
    });
</script>

</body>
</html>
