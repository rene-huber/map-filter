<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Globo · Buscador de ciudades</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.js"></script>
<style>
:root {
    --bg: #000;
    --fg: #fff;
    --accent: #ffe9a8;
}

* { box-sizing: border-box; }
html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    /* La página es scrolleable verticalmente (ver #scroll-spacer + el
       sistema SCROLL-DRIVEN PARALLAX en JS). Ocultamos la scrollbar
       para mantener la estética minimalista, sin perder la capacidad
       de scroll en mouse/trackpad/touch. */
    scrollbar-width: none;            /* Firefox */
    -ms-overflow-style: none;         /* IE / legacy Edge */
    overscroll-behavior: none;        /* sin rubber-band ni pull-to-refresh */
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
html::-webkit-scrollbar,
body::-webkit-scrollbar { display: none; }   /* Chrome / Safari / WebKit */

/* ---------------- Stage del mapa ----------------
   El canvas se extiende debajo de la viewport para que el globo,
   centrado dentro del canvas, quede visualmente cortado abajo.
   Su posición es FIJA — no se mueve al hacer una búsqueda; el
   marcador se reubica en el tope de la esfera vía coordenada
   geográfica calculada (ver computeResultCenterForTarget +
   CITY_LATITUDE_OFFSET en el script). */
#map-stage {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 180vh;
    z-index: 0;
    /* Tres CSS vars que JS actualiza por frame y componen el
       transform del stage según la fase de scroll:
         translate3d(--sphere-tx, --sphere-ty, 0)  ← fase 1: baja/derecha
                                                     (hasta t2 = 0.5)
         scale(--sphere-scale)                      ← fase 1 encoge;
                                                     fase 2 crece +5% y fija;
                                                     fase 3 scroll conjunto
       transform-origin: center → la esfera escala alrededor de su
       posición trasladada. El canvas y todos los markers son hijos
       del stage, por lo que el bloque entero se mueve y escala como
       una sola unidad rígida (la pose interna del mapa no cambia).
       will-change reserva una capa de compositor → sin reflow. */
    will-change: transform;
    --sphere-tx: 0px;
    --sphere-ty: 0px;
    --sphere-scale: 1;
    transform-origin: center center;
    transform: translate3d(var(--sphere-tx), var(--sphere-ty), 0)
               scale(var(--sphere-scale));
}
#map {
    width: 100%;
    height: 100%;
    background: #000;
}

/* ---------------- Header ----------------
   Efecto "glass" (vidrio esmerilado): fondo semitransparente oscuro +
   backdrop-filter para difuminar lo que pasa por detrás (el globo).
   Mantenemos el mismo lenguaje visual que el search input y las cards
   para que toda la UI se sienta uniforme. */
.header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 22px 38px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border-bottom: 0px solid transparent;
    box-shadow: none;
    transition:
        background 0.28s ease,
        padding 0.28s ease,
        border-color 0.28s ease,
        box-shadow 0.28s ease,
        backdrop-filter 0.28s ease;
}
.header.is-scrolled {
    padding: 15px 38px;
    background: rgba(15, 15, 20, 0.32);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border-bottom-color: rgba(255, 255, 255, 0.10);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
}
.header .brand {
    transition: transform 0.28s ease;
    transform-origin: left center;
}
.header.is-scrolled .brand {
    transform: scale(0.92);
}
.brand {
    display: flex;
    align-items: center;
    user-select: none;
}
.brand-logo {
    display: block;
    height: 38px;
    width: auto;
    max-width: min(220px, 42vw);
    object-fit: contain;
    transition: height 0.28s ease, transform 0.28s ease;
}
.header.is-scrolled .brand-logo {
    height: 32px;
}
.nav-and-icons {
    display: flex;
    align-items: center;
    gap: 28px;
}
.nav {
    display: flex;
    gap: 38px;
}
.nav a {
    color: #fff;
    text-decoration: none;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    transition: color .15s;
}
.nav a:hover { color: var(--accent); }
.icons {
    display: flex;
    gap: 8px;
    margin-left: 12px;
    border-left: 1px solid rgba(255, 255, 255, 0.18);
    padding-left: 20px;
}
.icons button {
    background: transparent;
    border: none;
    color: #fff;
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color .15s, transform .15s;
}
.icons button:hover { color: var(--accent); transform: translateY(-1px); }
.icons svg {
    width: 22px;
    height: 22px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
}

@media (max-width: 720px) {
    .header { padding: 16px 18px; }
    .nav { display: none; }
}

/* ---------------- Contenedor unificado para organizar el texto y el buscador ----------------
   Anclado justo encima de las primeras tarjetas independientes de la altura de pantalla.
   Maneja de forma rígida la estructura: Texto arriba, buscador abajo. */
#home-hero-container {
    position: fixed;
    left: 50%;
    bottom: calc(6vh + 499px + 56px + 24px);
    --scroll-offset: 0px;
    --home-opacity: 1;
    transform: translateX(-50%) translateY(var(--scroll-offset));
    opacity: var(--home-opacity);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    z-index: 5;
    width: min(1180px, 94vw);
    pointer-events: none;
    will-change: transform, opacity;
}

/* ---------------- Hero tagline ---------------- */
#hero-tagline {
    width: max-content;
    max-width: 100%;
    text-align: center;
    color: rgba(255, 255, 255, 0.92);
    font-size: 31px;
    font-weight: 500;
    letter-spacing: 0.03em;
    user-select: none;
    text-shadow: 0 1px 14px rgba(0, 0, 0, 0.65);
    white-space: nowrap;
}
/* Título del panel (misma animación letter-by-letter que el hero) */
#filter-panel-title {
    text-align: center;
    color: rgba(255, 255, 255, 0.94);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1.25;
    text-shadow: 0 1px 12px rgba(0, 0, 0, 0.55);
    margin: 0;
}
.hero-letter {
    display: inline-block;
    opacity: 0;
    filter: blur(14px);
    transform: scale(0.35);
    transform-origin: center center;
    animation: heroLetterIn 0.95s cubic-bezier(.2, .8, .25, 1) forwards;
    will-change: opacity, filter, transform;
}
.hero-letter.space {
    width: 0.32em;
}
@keyframes heroLetterIn {
    0% {
        opacity: 0;
        filter: blur(14px);
        transform: scale(0.35);
    }
    60% {
        opacity: 1;
        filter: blur(2px);
        transform: scale(1.04);
    }
    100% {
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
    }
}

/* ---------------- Search UI principal ---------------- */
#search-wrap {
    position: relative;
    width: min(540px, 90vw);
    pointer-events: auto;
}
#search {
    width: 100%;
    background: rgba(15, 15, 20, 0.42);
    backdrop-filter: blur(32px) saturate(160%);
    -webkit-backdrop-filter: blur(31px) ;
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 999px;
    padding: 16px 26px;
    font-size: 15px;
    letter-spacing: 0.02em;
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
}
#search::placeholder { color: rgba(255, 255, 255, 0.55); }
#search:focus {
    border-color: rgba(255, 233, 168, 0.45);
    background: rgba(255, 255, 255, 0.09);
    box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.55),
        0 0 30px rgba(255, 233, 168, 0.18);
}

/* Suggestions: posicionado en absoluto para no empujar las cards
   cuando aparece la lista debajo del input. */
   #suggestions, #filter-suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    margin-top: 8px;
    background: rgba(15, 15, 20, 0.55);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: none;
    border-radius: 18px;
    overflow: hidden;
    max-height: 320px;
    overflow-y: auto;
    display: none;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.55);
}

.suggestion {
    padding: 10px 18px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
}
.suggestion:hover, .suggestion.active {
    background: rgba(255, 233, 168, 0.12);
    color: var(--accent);
}
.suggestion .country {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.06em;
    text-transform: uppercase;
}

/* ---------------- Bottom controls (ocultos por defecto) ---------------- */
#controls { display: none; }

/* ---------------- Cards area (flechas + carrusel) ----------------
   Anclado a la parte baja del viewport pero subido un % para que el
   conjunto search + cards no quede pegado al footer. Ocupa todo el
   ancho para que el strip pueda desbordarse hacia la derecha cuando
   hay más cards de las que caben en pantalla. */
#cards-area {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 6vh;
    z-index: 4;
    pointer-events: none;
    /* --scroll-offset la actualiza JS: cards suben suavemente con el
       scroll (parallax factor < hero). */
    --scroll-offset: 0px;
    transform: translate3d(0, var(--scroll-offset), 0);
    will-change: transform;
}

/* Fila de flechas: una a cada extremo del carrusel (izquierda al
   borde izquierdo, derecha al borde derecho), espejadas. Como el
   carrusel es infinito (siempre hay material a ambos lados), las
   flechas viven siempre visibles. */
#cards-arrows {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 0 38px;
    margin-bottom: 14px;
    pointer-events: none;
}
.arrow-btn {
    pointer-events: auto;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(15, 15, 20, 0.55);
    backdrop-filter: blur(12px) saturate(160%);
    -webkit-backdrop-filter: blur(12px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.18);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, color .15s, border-color .15s, transform .15s;
}
.arrow-btn:hover {
    background: rgba(255, 233, 168, 0.15);
    color: var(--accent);
    border-color: rgba(255, 233, 168, 0.45);
    transform: translateY(-1px);
}
.arrow-btn:active { transform: translateY(0) scale(0.96); }
.arrow-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
}

/* Strip horizontal de tarjetas (carrusel infinito) */
#cards-strip {
    pointer-events: auto;
    width: 100%;
    overflow: hidden;
    cursor: grab;
    user-select: none;
}
#cards-strip.dragging { cursor: grabbing; }

#cards-track {
    display: flex;
    gap: 32px;
    width: max-content;
    padding: 0 38px;
    will-change: transform, scale;
    transform-origin: center center;
    scale: 1;
    /* Easing tipo spring: el press/release "rebota" suave. */
    transition: scale .42s cubic-bezier(.18, .89, .32, 1.28);
}
#cards-strip.dragging #cards-track { scale: 0.96; }

.workshop-card {
    flex: 0 0 352px;            /* 320 × 1.10 = 352 (10% más grande) */
    height: 455px;              /* 450 × 1.10 = 495 */
    border-radius: 17px;
    overflow: hidden;
    /* Background semitransparente para que la esfera se transparente
       a través de la card. El backdrop-filter blur la "esmerila" para
       que el contenido detrás siga siendo visible pero suavizado. */
    background: rgba(0, 0, 0, 0.036);
    backdrop-filter: blur(14px) ;
    -webkit-backdrop-filter: blur(24px) ;
    border: 1px solid rgba(255, 255, 255, 0.12);
    /* Sombra suave proyectada bajo la card. Le da el "depth" / efecto de
       flotación sobre la esfera. Al hacer hover, el offset crece y aparece
       un halo dorado sutil. */
    box-shadow: 0 22px 60px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: transform .25s ease, border-color .25s, box-shadow .25s, background .25s;
}
.workshop-card:hover {
    transform: translateY(-8px);
    background: rgba(15, 15, 20, 0.5);
    border-color: rgba(255, 233, 168, 0.45);
    box-shadow: 0 28px 70px rgba(0, 0, 0, 0.75), 0 0 40px rgba(255, 233, 168, 0.15);
}
.workshop-card .cover {
    position: relative;
    height: 231px;              /* 210 × 1.10 = 231 */
    background-size: cover;
    background-position: center;
    background-color: #222;
}
.workshop-card .cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(15,15,20,0.85) 100%);
}
.workshop-card .tag {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.15);
}
.workshop-card .body {
    padding: 18px 20px 20px;
    color: #fff;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 12px;
}
.workshop-card .title {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.005em;
    color: #fff;
}
.workshop-card .meta {
    font-size: 12px;
    letter-spacing: 0.06em;
    color: rgba(255, 255, 255, 0.6);
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    gap: 3px;
}
.workshop-card .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.workshop-card .price {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.01em;
}
.workshop-card .price small {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    margin-left: 3px;
}
.workshop-card .cta {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.85);
    border-bottom: 1px solid rgba(255, 255, 255, 0.4);
    padding-bottom: 1px;
}

@media (max-width: 900px) {
    #cards-track  { padding: 0 18px; }
    #cards-arrows { padding: 0 18px; }
    #cards-area   { bottom: 5vh; }
    #home-hero-container { bottom: calc(5vh + 396px + 56px + 20px); gap: 16px; }
    .workshop-card { flex-basis: 275px; height: 396px; }   /* 250→275, 360→396 (+10%) */
    .workshop-card .cover { height: 187px; }               /* 170 × 1.10 = 187 */
    .workshop-card .body  { padding: 14px 16px 16px; gap: 8px; }
    .workshop-card .title { font-size: 15px; }
    .workshop-card .meta  { font-size: 11px; }
    .workshop-card .price { font-size: 16px; }
}

@media (max-width: 720px) {
    #hero-tagline {
        font-size: 22px;
        letter-spacing: 0.18em;
        white-space: normal;
        line-height: 1.25;
    }
}

/* ---------------- Glow marker ---------------- */
.glow-wrap {
    position: relative;
    width: 1px;
    height: 1px;
    pointer-events: none;
}
.glow, .glow-pulse {
    position: absolute;
    left: 50%;
    top: 50%;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}
.glow {
    width: 140px;
    height: 140px;
    background: radial-gradient(circle,
        rgba(255, 250, 220, 0.95) 0%,
        rgba(255, 220, 150, 0.55) 22%,
        rgba(255, 180, 110, 0.18) 45%,
        transparent 70%);
    filter: blur(8px);
    animation: breathe 2.8s ease-in-out infinite;
}
.glow-pulse {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle,
        rgba(255, 245, 200, 0.7) 0%,
        rgba(255, 200, 120, 0.2) 50%,
        transparent 70%);
    animation: pulse 2.8s ease-out infinite;
}
@keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
    50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
}
@keyframes pulse {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    20%  { opacity: 0.9; }
    100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
}

/* ---------------- City label ---------------- */
.city-label {
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 0 12px rgba(255, 220, 150, 0.9), 0 0 4px rgba(0, 0, 0, 0.9);
}
.city-label-inner {
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp .8s ease .4s forwards;
}
.city-label .city-name {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    line-height: 1;
}
.city-label .country-name {
    margin-top: 6px;
    color: rgba(255, 255, 255, 0.75);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.30em;
    text-transform: uppercase;
    line-height: 1;
}
@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}

/* ---------------- Filter panel (fase 2 / 3) ----------------
   Centrado en la mitad izquierda del viewport; más alto y ancho. */
#filter-panel {
    position: fixed;
    top: 50%;
    left: 25vw;
    width: min(40vw, 500px);
    z-index: 6;
    --scroll-offset: 0px;
    transform: translate(-50%, calc(-50% + var(--scroll-offset)));
    will-change: transform, opacity;
    --filter-opacity: 0;
    opacity: var(--filter-opacity);
    pointer-events: none;

    padding: 32px 28px 28px;
    background: rgba(15, 15, 20, 0.42);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 22px;
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
    color: #fff;

    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 22px;
}
#filter-panel.is-active .filter-search-wrap,
#filter-panel.is-active .filter-buttons {
    pointer-events: auto;
}
.filter-search {
    width: 100%;
    background: rgba(46, 46, 46, 0.04);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 999px;
    padding: 14px 22px;
    font-size: 14px;
    outline: none;
    transition: border-color .15s, background .15s;
}
.filter-search::placeholder { color: rgba(255, 255, 255, 0.45); }
.filter-search:focus {
    border-color: rgba(255, 233, 168, 0.45);
    background: rgba(46, 46, 46, 0.10);
}
.filter-buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}
.filter-buttons button {
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s, color .15s, border-color .15s, transform .15s;
}
.filter-buttons button:hover {
    background: rgba(255, 233, 168, 0.10);
    color: var(--accent);
    border-color: rgba(255, 233, 168, 0.40);
    transform: translateY(-1px);
}
.filter-buttons button:active { transform: translateY(0) scale(0.98); }

@media (max-width: 720px) {
    #filter-panel {
        left: 50%;
        width: min(92vw, 500px);
        padding: 24px 18px 20px;
    }
    #filter-panel-title { font-size: 18px; }
}

/* ---------------- Result cards (bajo el panel, post-búsqueda) ----------------
   Cards compactas: imagen a tamaño real + datos superpuestos + precio abajo. */
#result-cards-area {
    position: fixed;
    left: 25vw;
    top: calc(50% + 210px);
    width: min(calc(2 * 168px + 20px), 40vw);
    z-index: 6;
    --scroll-offset: 0px;
    --result-opacity: 0;
    opacity: var(--result-opacity);
    transform: translate(-50%, var(--scroll-offset));
    will-change: transform, opacity;
    pointer-events: none;
}
#result-cards-area.is-interactive {
    pointer-events: auto;
}
#result-cards-arrows {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 14px;
}
#result-cards-arrows .arrow-btn:disabled {
    opacity: 0.35;
    cursor: default;
    pointer-events: none;
}
#result-cards-strip {
    overflow: hidden;
    width: 100%;
}

<script>

    const SEARCH_CARD_TEMPLATES = [
        { tag: 'Photography',  titleSuffix: ' Streets & Skylines',   date: 'Mar 15 – 22, 2026', price: '$2,890', image: 'https://images.unsplash.com/photo-1480796927426-f609979314bd?w=600&q=80' },
        { tag: 'Culinary',     titleSuffix: ' Food & Markets',       date: 'May 5 – 11, 2026',  price: '$1,420', image: 'https://images.unsplash.com/photo-1539711757989-04ae22d9c34f?w=600&q=80' },
        { tag: 'Wellness',     titleSuffix: ' Wellness Retreat',     date: 'Apr 12 – 19, 2026', price: '$2,150', image: 'https://images.unsplash.com/photo-1545205597-3d9d02c29597?w=600&q=80' },
        { tag: 'Adventure',    titleSuffix: ' Hidden Adventures',    date: 'Feb 8 – 14, 2027',  price: '$3,250', image: 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=600&q=80' },
        { tag: 'Coffee',       titleSuffix: ' Coffee & Cafés',       date: 'Jun 18 – 25, 2026', price: '$1,890', image: 'https://images.unsplash.com/photo-1559842474-d8d65bd47ae3?w=600&q=80' },
        { tag: 'Architecture', titleSuffix: ' Architecture Walk',    date: 'Sep 4 – 11, 2026',  price: '$2,650', image: 'https://images.unsplash.com/photo-1483347756197-71ef80e95f73?w=600&q=80' },
        { tag: 'Art',          titleSuffix: ' Galleries & Museums',  date: 'Oct 18 – 24, 2026', price: '$2,180', image: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=600&q=80' }
    ];

    const cardsStrip = document.getElementById('cards-strip');
    const cardsArea  = document.getElementById('cards-area');
    const cardsTrack = document.getElementById('cards-track');

    function buildCardsForCity(cityName) {
        const country = (cities.find(c => c.name === cityName) || {}).country || '';
        return SEARCH_CARD_TEMPLATES.map(t => ({
            tag: t.tag,
            title: cityName + t.titleSuffix,
            location: cityName + (country ? ', ' + country : ''),
            date: t.date,
            price: t.price,
            city: cityName,
            image: t.image
        }));
    }

    function buildRandomCards(count) {
        const out = [];
        const used = new Set();
        const shuffledTemplates = SEARCH_CARD_TEMPLATES
            .map(t => [t, Math.random()])
            .sort((a, b) => a[1] - b[1])
            .map(([t]) => t);
        for (let i = 0; i < count; i++) {
            const t = shuffledTemplates[i % shuffledTemplates.length];
            let city = cities[Math.floor(Math.random() * cities.length)];
            let attempts = 0;
            while (used.has(city.name) && attempts < 8) {
                city = cities[Math.floor(Math.random() * cities.length)];
                attempts++;
            }
            used.add(city.name);
            if (used.size >= cities.length) used.clear();
            out.push({
                tag: t.tag,
                title: city.name + t.titleSuffix,
                location: city.name + ', ' + city.country,
                date: t.date,
                price: t.price,
                city: city.name,
                image: t.image
            });
        }
        return out;
    }

    let stripCardsCount    = 0;
    let stripSingleSetWidth = 0;

    function buildCardHtml(w) {
        return `
            <article class="workshop-card" data-city="${w.city}">
                <div class="cover" style="background-image:url('${w.image}')">
                    <span class="tag">${w.tag}</span>
                </div>
                <div class="body">
                    <div>
                        <div class="title">${w.title}</div>
                        <div class="meta" style="margin-top:8px">
                            <span>${w.location}</span>
                            <span>${w.date}</span>
                        </div>
                    </div>
                    <div class="footer">
                        <div class="price">${w.price}<small>USD</small></div>
                        <div class="cta">Book</div>
                    </div>
                </div>
            </article>`;
    }

    function buildResultCardHtml(w) {
        return `
            <article class="result-card" data-city="${w.city}">
                <div class="result-card-image" style="background-image:url('${w.image}')">
                    <span class="result-card-tag">${w.tag}</span>
                    <div class="result-card-overlay">
                        <h3 class="result-card-title">${w.title}</h3>
                        <p class="result-card-meta">${w.location}</p>
                        <div class="result-card-price">${w.price}</div>
                    </div>
                </div>
            </article>`;
    }

    function renderCards(cards) {
        stripCardsCount = cards.length;
        const setHtml = cards.map(buildCardHtml).join('');
        cardsTrack.innerHTML = setHtml + setHtml;
        stripOffset = 0;
        stripVelocity = STRIP_AUTO_SPEED;
        cardsTrack.style.transform = 'translate3d(0, 0, 0)';
        requestAnimationFrame(updateStripLayout);
    }

    function updateStripLayout() {
        const isMobile  = window.innerWidth <= 900;
        const cardWidth = isMobile ? 275 : 352;
        const gap       = 32;
        stripSingleSetWidth = stripCardsCount * (cardWidth + gap);
    }

    const RESULT_VISIBLE_COUNT = 2;
    const resultCardsArea   = document.getElementById('result-cards-area');
    const resultCardsTrack  = document.getElementById('result-cards-track');
    const resultArrowLeft   = document.getElementById('result-arrow-left');
    const resultArrowRight  = document.getElementById('result-arrow-right');

    let resultViewActive = false;
    let resultCardsList  = [];
    let resultPageIndex  = 0;

    function getResultCardMetrics() {
        const w = window.innerWidth;
        if (w <= 720) return { cardWidth: 140, gap: 14 };
        if (w <= 900) return { cardWidth: 148, gap: 16 };
        return { cardWidth: 168, gap: 20 };
    }

    function getResultStepPx() {
        const { cardWidth, gap } = getResultCardMetrics();
        return cardWidth + gap;
    }

    function getResultMaxPageIndex() {
        return Math.max(0, resultCardsList.length - RESULT_VISIBLE_COUNT);
    }

    function updateResultCarouselUI() {
        const step = getResultStepPx();
        resultCardsTrack.style.transform = `translate3d(${-resultPageIndex * step}px, 0, 0)`;
        resultArrowLeft.disabled  = resultPageIndex <= 0;
        resultArrowRight.disabled = resultPageIndex >= getResultMaxPageIndex();
    }

    function setResultViewActive(active) {
        resultViewActive = active;
        if (!active) {
            resultCardsList = [];
            resultPageIndex = 0;
            resultCardsTrack.innerHTML = '';
        }
        snapVisualScrollToReal();
    }

    function renderResultCards(cards) {
        resultCardsList = cards;
        resultPageIndex = 0;
        resultCardsTrack.innerHTML = cards.map(buildResultCardHtml).join('');
        setResultViewActive(true);
        requestAnimationFrame(updateResultCarouselUI);
    }

    resultArrowLeft.addEventListener('click', () => {
        if (resultPageIndex <= 0) return;
        resultPageIndex--;
        updateResultCarouselUI();
    });
    resultArrowRight.addEventListener('click', () => {
        if (resultPageIndex >= getResultMaxPageIndex()) return;
        resultPageIndex++;
        updateResultCarouselUI();
    });

    let layoutRaf = null;
    window.addEventListener('resize', () => {
        if (resultViewActive) updateResultCarouselUI();
        if (layoutRaf) cancelAnimationFrame(layoutRaf);
        layoutRaf = requestAnimationFrame(updateStripLayout);
    });

    const STRIP_AUTO_SPEED   = 12;
    const STRIP_INERTIA_TAU  = 0.55;
    const STRIP_MAX_VELOCITY = 1800;
    const STRIP_ARROW_IMPULSE = 600;

    let stripOffset   = 0;
    let stripVelocity = STRIP_AUTO_SPEED;

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    const RANDOM_INITIAL_CARDS = 14;

    const cities = [
        { name: 'Buenos Aires', country: 'Argentina', coords: [-58.3816, -34.6037] },
        { name: 'Tokio',        country: 'Japón',      coords: [139.6917, 35.6895] },
        { name: 'Nueva York',   country: 'EE.UU.',     coords: [-74.0060, 40.7128] },
        { name: 'Londres',      country: 'Reino Unido',coords: [-0.1276, 51.5074] },
        { name: 'París',        country: 'Francia',    coords: [2.3522, 48.8566] },
        { name: 'Sídney',       country: 'Australia',  coords: [151.2093, -33.8688] },
        { name: 'Mumbai',       country: 'India',      coords: [72.8777, 19.0760] },
        { name: 'El Cairo',     country: 'Egipto',     coords: [31.2357, 30.0444] },
        { name: 'Río de Janeiro',country:'Brasil',     coords: [-43.1729, -22.9068] },
        { name: 'Moscú',        country: 'Rusia',      coords: [37.6173, 55.7558] },
        { name: 'Pekín',        country: 'China',      coords: [116.4074, 39.9042] },
        { name: 'Ciudad del Cabo',country: 'Sudáfrica',coords: [18.4241, -33.9249] },
        { name: 'Los Ángeles',  country: 'EE.UU.',     coords: [-118.2437, 34.0522] },
        { name: 'Ciudad de México',country:'México',   coords: [-99.1332, 19.4326] },
        { name: 'Berlín',       country: 'Alemania',   coords: [13.4050, 52.5200] },
        { name: 'Madrid',       country: 'España',     coords: [-3.7038, 40.4168] },
        { name: 'Estambul',     country: 'Turquía',    coords: [28.9784, 41.0082] },
        { name: 'Bangkok',      country: 'Tailandia',  coords: [100.5018, 13.7563] },
        { name: 'Singapur',     country: 'Singapur',   coords: [103.8198, 1.3521] },
        { name: 'Dubái',        country: 'EAU',        coords: [55.2708, 25.2048] },
        { name: 'Toronto',      country: 'Canadá',     coords: [-79.3832, 43.6532] },
        { name: 'Lima',         country: 'Perú',       coords: [-77.0428, -12.0464] },
        { name: 'Reikiavik',    country: 'Islandia',   coords: [-21.9426, 64.1466] },
        { name: 'Atenas',       country: 'Grecia',     coords: [23.7275, 37.9838] }
    ];

    const DEFAULT_CENTER = [20, 25];
    const DEFAULT_ZOOM    = 3.87;
    const DEFAULT_PITCH   = 10;
    const DEFAULT_BEARING = 0;
    const RESULT_ZOOM     = DEFAULT_ZOOM;
    const RESULT_PITCH    = DEFAULT_PITCH;
    const CITY_LATITUDE_OFFSET = 15;

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: DEFAULT_CENTER,
        zoom: DEFAULT_ZOOM,
        pitch: DEFAULT_PITCH,
        bearing: DEFAULT_BEARING,
        attributionControl: false,
        scrollZoom: false,
        doubleClickZoom: false,
        boxZoom: false,
        touchZoomRotate: false,
        dragPan: { deceleration: 99999 }
    });

    function computeResultCenterForTarget(target) {
        return [target[0], target[1] - CITY_LATITUDE_OFFSET];
    }

    map.on('load', () => {
        map.setProjection({ type: 'globe' });
        map.getStyle().layers
            .filter(l => l.type === 'symbol')
            .forEach(l => map.setLayoutProperty(l.id, 'visibility', 'none'));

        map.setSky({
            'sky-color': '#000000',
            'horizon-color': '#0a0a18',
            'fog-color': '#000000',
            'sky-horizon-blend': 0.02,
            'horizon-fog-blend': 0.1,
            'fog-ground-blend': 0.0,
            'atmosphere-blend': 0.5
        });
    });

    const MAX_SPIN = 240;
    const INERTIA_TAU = 2.5;

    let degreesPerSecond  = 6;
    let currentSpinSpeed  = degreesPerSecond;
    let spinning          = true;
    let lastFrameTs       = null;
    let userDragging      = false;
    let mapAnimating      = false;

    let lastDragLng = null;
    let lastDragTs = null;
    let velocitySamples = [];

    function recordSample(v) {
        velocitySamples.push(v);
        if (velocitySamples.length > 5) velocitySamples.shift();
    }
    function avgVelocity() {
        if (!velocitySamples.length) return 0;
        return velocitySamples.reduce((s, v) => s + v, 0) / velocitySamples.length;
    }

    function startDrag() {
        userDragging = true;
        currentSpinSpeed = 0;
        lastDragLng = map.getCenter().lng;
        lastDragTs = performance.now();
        velocitySamples = [];
    }
    function endDrag() {
        if (!userDragging) return;
        userDragging = false;
        const v = avgVelocity();
        if (Math.abs(v) > 0.5) {
            currentSpinSpeed = -v;
            currentSpinSpeed = Math.max(-MAX_SPIN, Math.min(MAX_SPIN, currentSpinSpeed));
        }
        lastDragLng = null;
        lastDragTs = null;
    }

    map.on('mousedown', startDrag);
    map.on('touchstart', startDrag);
    map.on('mouseup', endDrag);
    map.on('touchend', endDrag);

    map.on('move', () => {
        if (!userDragging) return;
        const now = performance.now();
        const lng = map.getCenter().lng;
        if (lastDragLng !== null && lastDragTs !== null) {
            const dt = (now - lastDragTs) / 1000;
            if (dt > 0) {
                let dLng = lng - lastDragLng;
                if (dLng > 180) dLng -= 360;
                if (dLng < -180) dLng += 360;
                recordSample(dLng / dt);
            }
        }
        lastDragLng = lng;
        lastDragTs = now;
    });

    const ZOOM_WHEEL_SENSITIVITY = 0.0025;
    const ZOOM_EASE_DURATION_MS  = 120;
    map.getCanvasContainer().addEventListener('wheel', (e) => {
        if (!(e.ctrlKey || e.metaKey)) return;
        e.preventDefault();
        e.stopPropagation();
        const dz = -e.deltaY * ZOOM_WHEEL_SENSITIVITY;
        map.easeTo({
            zoom: map.getZoom() + dz,
            duration: ZOOM_EASE_DURATION_MS,
            essential: true
        });
    }, { passive: false });

    // ---------------- PARALLAX DRIVEN SCROLL ----------------
    // 1 = velocidad normal · 0.5 = mitad de velocidad (2× más scroll / rueda)

    const SCROLL_VISUAL_EASE = 0.12; // más bajo = más suave (0.08–0.15)
    let visualScrollY = window.scrollY || 0;
    
    const SCROLL_ANIM_SPEED           = 0.5;
    const POST_CARDS_EXIT_SCROLL_PX   = 800 / SCROLL_ANIM_SPEED;
    const SPHERE_BONUS_GROW_SCROLL_PX = 400 / SCROLL_ANIM_SPEED;
    const SPHERE_BONUS_SCALE          = 0.7;
    const SPHERE_FINAL_OFFSET_X_VW = 22;
    const SPHERE_FINAL_OFFSET_Y_VH = -24;
    const SPHERE_FINAL_SCALE       = 0.45;
    const SPHERE_INITIAL_ZOOM      = DEFAULT_ZOOM;
    const SPHERE_FINAL_ZOOM        = 2.40;
    const CARDS_PARALLAX       = 0.5 * SCROLL_ANIM_SPEED;
    const HOME_PARALLAX        = 0.85 * SCROLL_ANIM_SPEED;
    const FILTER_PE_THRESHOLD  = 0.05;
    const HEADER_SCROLL_PX = 70;

    const mapStageEl     = document.getElementById('map-stage');
    const headerEl       = document.querySelector('.header');
    const heroEl         = document.getElementById('hero-tagline');
    const homeHeroEl     = document.getElementById('home-hero-container');
    const searchWrapEl   = document.getElementById('search-wrap');
    const cardsAreaEl    = document.getElementById('cards-area');
    const filterPanelEl  = document.getElementById('filter-panel');
    const scrollSpacer   = document.getElementById('scroll-spacer');

    function clamp01(v) { return v < 0 ? 0 : (v > 1 ? 1 : v); }

    function getCardsLayout(vh) {
        const isMobile = window.innerWidth <= 900;
        const areaHeight = (42 + 14) + (isMobile ? 396 : 455);
        const bottomFraction = isMobile ? 0.05 : 0.06;
        const topAtZero = vh * (1 - bottomFraction) - areaHeight;
        return { areaHeight, topAtZero };
    }

    function getCardsStartExitScrollY(vh) {
        const { topAtZero } = getCardsLayout(vh);
        if (topAtZero <= 0) return 1;
        return topAtZero / CARDS_PARALLAX;
    }

    function getCardsFullExitScrollY(vh) {
        const { areaHeight, topAtZero } = getCardsLayout(vh);
        const bottomAtZero = topAtZero + areaHeight;
        if (bottomAtZero <= 0) return 0;
        return bottomAtZero / CARDS_PARALLAX;
    }

    function getScrollPhaseBounds(vh) {
        const cardsStartY = getCardsStartExitScrollY(vh);
        const cardsFullY  = getCardsFullExitScrollY(vh);
        const pinnedSpan  = Math.max(cardsFullY - cardsStartY, 1);
        const sphereEndY  = cardsStartY + 0.5 * pinnedSpan;
        const growEndY    = sphereEndY + SPHERE_BONUS_GROW_SCROLL_PX;
        const postExitStartY = growEndY;
        const maxScrollY  = postExitStartY + POST_CARDS_EXIT_SCROLL_PX;
        return { cardsStartY, cardsFullY, pinnedSpan, sphereEndY, growEndY, postExitStartY, maxScrollY };
    }

    function getMaxScrollY(vh) {
        return getScrollPhaseBounds(vh).maxScrollY;
    }

    function updateScrollLayout() {
        const vh = window.innerHeight;
        const h  = getMaxScrollY(vh) + vh;
        scrollSpacer.style.height = h + 'px';
    }

    function applyScrollEffects(yVisual, yReal) {
        const realY = yReal ?? (window.scrollY || window.pageYOffset || 0);
        const visualY = yVisual ?? realY;
        const vh = window.innerHeight;
        const vw = window.innerWidth;

        const { cardsStartY, pinnedSpan, sphereEndY, growEndY } = getScrollPhaseBounds(vh);

        const t1 = clamp01(sphereEndY > 0 ? visualY / sphereEndY : 1);
        const t2 = clamp01((realY - cardsStartY) / pinnedSpan);
        const tGrow = clamp01((visualY - sphereEndY) / SPHERE_BONUS_GROW_SCROLL_PX);

        const sphereTx    = t1 * vw * (SPHERE_FINAL_OFFSET_X_VW / 100);
        const sphereTy    = t1 * vh * (SPHERE_FINAL_OFFSET_Y_VH / 100);
        const animScale   = 1 + t1 * (SPHERE_FINAL_SCALE - 1);
        const sphereScale = animScale * (1 + SPHERE_BONUS_SCALE * tGrow);

        const postExitDeltaVisual = Math.max(0, Math.min(visualY - growEndY, POST_CARDS_EXIT_SCROLL_PX));
        const postExitTyVisual    = -postExitDeltaVisual;
        const postExitDeltaReal   = Math.max(0, Math.min(realY - growEndY, POST_CARDS_EXIT_SCROLL_PX));
        const postExitTyReal      = -postExitDeltaReal;

        mapStageEl.style.setProperty('--sphere-tx',    sphereTx.toFixed(2)                         + 'px');
        mapStageEl.style.setProperty('--sphere-ty',    (sphereTy + postExitTyVisual).toFixed(2)   + 'px');
        mapStageEl.style.setProperty('--sphere-scale', sphereScale.toFixed(4));

        if (headerEl) {
            if (realY >= HEADER_SCROLL_PX) headerEl.classList.add('is-scrolled');
            else                           headerEl.classList.remove('is-scrolled');
        }

        const homeUiOp = clamp01(1 - t1);
        if (homeHeroEl) {
            homeHeroEl.style.setProperty('--home-opacity',    homeUiOp.toFixed(4));
            homeHeroEl.style.setProperty('--scroll-offset',   (-realY * HOME_PARALLAX).toFixed(2) + 'px');
            homeHeroEl.style.pointerEvents = homeUiOp > 0.05 ? 'auto' : 'none';
        }

        cardsAreaEl.style.setProperty('--scroll-offset', (-realY * CARDS_PARALLAX).toFixed(2) + 'px');

        filterPanelEl.style.setProperty('--filter-opacity', t2.toFixed(4));
        filterPanelEl.style.setProperty('--scroll-offset',  postExitTyReal.toFixed(2) + 'px');
        if (t2 > FILTER_PE_THRESHOLD) filterPanelEl.classList.add('is-active');
        else                          filterPanelEl.classList.remove('is-active');

        const resultOp = resultViewActive ? t2 : 0;
        resultCardsArea.style.setProperty('--result-opacity', resultOp.toFixed(4));
        resultCardsArea.style.setProperty('--scroll-offset',  postExitTyReal.toFixed(2) + 'px');
        resultCardsArea.setAttribute('aria-hidden', resultOp > FILTER_PE_THRESHOLD ? 'false' : 'true');
        resultCardsArea.classList.toggle('is-interactive', resultOp > FILTER_PE_THRESHOLD);

        if (!mapAnimating && !userDragging) {
            const zoom = SPHERE_INITIAL_ZOOM + (SPHERE_FINAL_ZOOM - SPHERE_INITIAL_ZOOM) * t1;
            if (Math.abs(map.getZoom() - zoom) > 0.001) {
                map.setZoom(zoom);
            }
        }
    }

    function snapVisualScrollToReal() {
        const realY = window.scrollY || window.pageYOffset || 0;
        visualScrollY = realY;
        applyScrollEffects(visualScrollY, realY);
    }

    function scrollToTarget(y, smooth) {
        const clamped = Math.max(0, Math.min(y, getMaxScrollY(window.innerHeight)));
        window.scrollTo({ top: clamped, behavior: smooth ? 'smooth' : 'instant' });
    }

    window.addEventListener('resize', () => {
        updateScrollLayout();
        snapVisualScrollToReal();
    });

    updateScrollLayout();
    snapVisualScrollToReal();

    function isAutoSpinAllowed() {
        if (!spinning)          return false;
        if (userDragging)       return false;
        if (activeResult)       return false;
        if (mapAnimating)       return false;
        return true;
    }

    function frame(ts) {
        const realY = window.scrollY || window.pageYOffset || 0;
        visualScrollY += (realY - visualScrollY) * SCROLL_VISUAL_EASE;
        applyScrollEffects(visualScrollY, realY);

        if (lastFrameTs === null) lastFrameTs = ts;
        const dt = (ts - lastFrameTs) / 1000;
        lastFrameTs = ts;

        if (isAutoSpinAllowed()) {
            const k = Math.min(1, dt / INERTIA_TAU);
            currentSpinSpeed += (degreesPerSecond - currentSpinSpeed) * k;

            const center = map.getCenter();
            center.lng -= currentSpinSpeed * dt;
            map.jumpTo({ center });
        }

        if (!cardDragActive) {
            const ks = Math.min(1, dt / STRIP_INERTIA_TAU);
            stripVelocity += (STRIP_AUTO_SPEED - stripVelocity) * ks;
            stripOffset   += stripVelocity * dt;
        }
        if (stripSingleSetWidth > 0) {
            while (stripOffset >= stripSingleSetWidth) stripOffset -= stripSingleSetWidth;
            while (stripOffset < 0)                    stripOffset += stripSingleSetWidth;
        }
        cardsTrack.style.transform = `translate3d(${-stripOffset}px, 0, 0)`;

        requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    const input              = document.getElementById('search');
    const filterInput        = document.querySelector('.filter-search');
    const suggestions        = document.getElementById('suggestions');
    const filterSuggestions  = document.getElementById('filter-suggestions');
    const toggleBtn          = document.getElementById('toggle');
    const clearBtn           = document.getElementById('clear');
    const speedInput         = document.getElementById('speed');

    let activeResult = null;

    function getSearchTargetScrollY() {
        return getCardsFullExitScrollY(window.innerHeight);
    }

    function hideAllSuggestions() {
        suggestions.style.display = 'none';
        filterSuggestions.style.display = 'none';
    }

    function clearMarkersOnly() {
        if (!activeResult) return;
        activeResult.glowMarker?.remove();
        activeResult.labelMarker?.remove();
        activeResult = null;
    }

    function renderSuggestionsFor(q, listEl, activeIndex) {
        if (!q) { listEl.style.display = 'none'; return activeIndex; }
        const norm = q.toLowerCase().trim();
        const matches = cities
            .filter(c => c.name.toLowerCase().includes(norm))
            .slice(0, 8);
        if (!matches.length) { listEl.style.display = 'none'; return activeIndex; }
        listEl.innerHTML = matches.map((c, i) => `
            <div class="suggestion ${i === activeIndex ? 'active' : ''}" data-name="${c.name}">
                <span>${c.name}</span>
                <span class="country">${c.country}</span>
            </div>
        `).join('');
        listEl.style.display = 'block';
        return activeIndex;
    }

    function resolveChosenCityName(inputEl, listEl, activeIndex) {
        const items = listEl.querySelectorAll('.suggestion');
        return items[activeIndex]?.dataset.name
            || items[0]?.dataset.name
            || cities.find(c => c.name.toLowerCase() === inputEl.value.toLowerCase().trim())?.name;
    }

    function attachSearchInput(inputEl, listEl, source) {
        let activeIndex = -1;

        inputEl.addEventListener('input', () => {
            if (source === 'filter' && !inputEl.value.trim() && activeResult) {
                clearResult('marker-only');
                return;
            }
            activeIndex = -1;
            activeIndex = renderSuggestionsFor(inputEl.value, listEl, activeIndex);
        });

        inputEl.addEventListener('keydown', (e) => {
            const items = listEl.querySelectorAll('.suggestion');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIndex = Math.min(activeIndex + 1, Math.max(items.length - 1, 0));
                renderSuggestionsFor(inputEl.value, listEl, activeIndex);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIndex = Math.max(activeIndex - 1, 0);
                renderSuggestionsFor(inputEl.value, listEl, activeIndex);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                const chosenName = resolveChosenCityName(inputEl, listEl, activeIndex);
                if (chosenName) selectCity(chosenName, { source });
            } else if (e.key === 'Escape') {
                clearResult(source === 'main' ? 'full' : 'marker-only');
            }
        });

        listEl.addEventListener('click', (e) => {
            const item = e.target.closest('.suggestion');
            if (item) selectCity(item.dataset.name, { source });
        });
    }

    attachSearchInput(input, suggestions, 'main');
    attachSearchInput(filterInput, filterSuggestions, 'filter');

    document.addEventListener('click', (e) => {
        if (!e.target.closest('#home-hero-container')) suggestions.style.display = 'none';
        if (!e.target.closest('.filter-search-wrap')) filterSuggestions.style.display = 'none';
    });

    function selectCity(name, { source = 'main' } = {}) {
        const city = cities.find(c => c.name === name);
        if (!city) return;

        if (source === 'main') input.value = city.name;
        else                    filterInput.value = city.name;
        hideAllSuggestions();

        const jitter = () => (Math.random() - 0.5) * 0.6;
        const target = [city.coords[0] + jitter(), city.coords[1] + jitter()];

        clearMarkersOnly();

        if (source === 'main') {
            scrollToTarget(getSearchTargetScrollY(), true);
        }

        activeResult = { city, target, source };
        renderResultCards(buildCardsForCity(city.name));

        const bearing = 0;
        const mapCenter = computeResultCenterForTarget(target);

        mapAnimating = true;
        map.easeTo({
            center: mapCenter,
            zoom: SPHERE_FINAL_ZOOM,
            pitch: RESULT_PITCH,
            bearing: bearing,
            duration: 2500,
            essential: true
        });

        map.once('moveend', () => {
            mapAnimating = false;
            snapVisualScrollToReal();
            if (!activeResult) return;

            const glowEl = document.createElement('div');
            glowEl.className = 'glow-wrap';
            glowEl.innerHTML = '<div class="glow"></div><div class="glow-pulse"></div>';
            const glowMarker = new maplibregl.Marker({ element: glowEl })
                .setLngLat(target)
                .addTo(map);

            const labelEl = document.createElement('div');
            labelEl.className = 'city-label';
            labelEl.innerHTML = `
                <div class="city-label-inner">
                    <div class="city-name">${city.name}</div>
                    <div class="country-name">${city.country}</div>
                </div>
            `;
            const labelMarker = new maplibregl.Marker({
                element: labelEl,
                anchor: 'top',
                offset: [0, 60]
            })
                .setLngLat(target)
                .addTo(map);

            activeResult.glowMarker  = glowMarker;
            activeResult.labelMarker = labelMarker;
        });
    }

    function clearResult(mode = 'full') {
        if (mode === false) {
            clearMarkersOnly();
            return;
        }

        clearMarkersOnly();

        if (mode === 'marker-only') {
            filterInput.value = '';
            filterSuggestions.innerHTML = '';
            hideAllSuggestions();
            filterInput.blur();
            currentSpinSpeed = degreesPerSecond;
            return;
        }

        input.value = '';
        filterInput.value = '';
        suggestions.innerHTML = '';
        filterSuggestions.innerHTML = '';
        hideAllSuggestions();
        input.blur();
        filterInput.blur();

        setResultViewActive(false);
        renderCards(buildRandomCards(RANDOM_INITIAL_CARDS));

        scrollToTarget(0, true);
        currentSpinSpeed = degreesPerSecond;
        mapAnimating = true;
        map.easeTo({
            center: DEFAULT_CENTER,
            pitch: DEFAULT_PITCH,
            bearing: DEFAULT_BEARING,
            zoom: DEFAULT_ZOOM,
            duration: 1800,
            essential: true
        });
        map.once('moveend', () => {
            mapAnimating = false;
            snapVisualScrollToReal();
        });
    }

    toggleBtn.addEventListener('click', () => {
        spinning = !spinning;
        toggleBtn.textContent = spinning ? 'Pausar' : 'Reanudar';
    });
    clearBtn.addEventListener('click', () => clearResult('full'));
    speedInput.addEventListener('input', (e) => {
        degreesPerSecond = Number(e.target.value);
    });

    renderCards(buildRandomCards(RANDOM_INITIAL_CARDS));

    function injectLetterTagline(host, text, staggerMs, initialDelayMs) {
        if (!host) return;
        const chars = Array.from(text);
        host.innerHTML = chars.map((ch, i) => {
            const isSpace = ch === ' ';
            const delay = (initialDelayMs + i * staggerMs) / 1000;
            const cls = 'hero-letter' + (isSpace ? ' space' : '');
            const content = isSpace ? '' : ch;
            return `<span class="${cls}" style="animation-delay:${delay.toFixed(3)}s">${content}</span>`;
        }).join('');
    }

    injectLetterTagline(
        document.getElementById('hero-tagline'),
        'Create with artists in their private studios worldwide.',
        38,
        250
    );
    injectLetterTagline(
        document.getElementById('filter-panel-title'),
        'Find your next studio experience',
        32,
        120
    );

    const DRAG_CLICK_THRESHOLD = 5;
    const STRIP_DRAG_VELOCITY_SAMPLES = 5;

    let cardDragActive       = false;
    let cardDragStartX       = 0;
    let cardDragStartOffset  = 0;
    let cardDragMoved        = false;
    let cardDragLastX        = 0;
    let cardDragLastTs       = 0;
    let cardDragVelocitySamples = [];

    function recordDragVelocitySample(dx, dt) {
        if (dt <= 0) return;
        cardDragVelocitySamples.push(dx / dt);
        if (cardDragVelocitySamples.length > STRIP_DRAG_VELOCITY_SAMPLES) {
            cardDragVelocitySamples.shift();
        }
    }
    function avgDragVelocity() {
        if (!cardDragVelocitySamples.length) return 0;
        return cardDragVelocitySamples.reduce((s, v) => s + v, 0) / cardDragVelocitySamples.length;
    }

    cardsStrip.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        cardDragActive       = true;
        cardDragMoved        = false;
        cardDragStartX       = e.clientX;
        cardDragStartOffset  = stripOffset;
        cardDragLastX        = e.clientX;
        cardDragLastTs       = performance.now();
        cardDragVelocitySamples = [];
        cardsStrip.classList.add('dragging');
        try { cardsStrip.setPointerCapture(e.pointerId); } catch (_) {}
    });

    cardsStrip.addEventListener('pointermove', (e) => {
        if (!cardDragActive) return;
        const now = performance.now();
        const dx  = e.clientX - cardDragStartX;
        if (Math.abs(dx) > DRAG_CLICK_THRESHOLD) cardDragMoved = true;
        stripOffset = cardDragStartOffset - dx;

        const dxFrame = e.clientX - cardDragLastX;
        const dtFrame = (now - cardDragLastTs) / 1000;
        recordDragVelocitySample(dxFrame, dtFrame);
        cardDragLastX  = e.clientX;
        cardDragLastTs = now;
    });

    function endCardDrag(e) {
        if (!cardDragActive) return;
        cardDragActive = false;
        cardsStrip.classList.remove('dragging');
        if (e && e.pointerId !== undefined) {
            try { cardsStrip.releasePointerCapture(e.pointerId); } catch (_) {}
        }
        const v = avgDragVelocity();
        if (Math.abs(v) > 80) {
            stripVelocity = clamp(-v, -STRIP_MAX_VELOCITY, STRIP_MAX_VELOCITY);
        } else {
            stripVelocity = STRIP_AUTO_SPEED;
        }
        cardDragVelocitySamples = [];
    }
    cardsStrip.addEventListener('pointerup', endCardDrag);
    cardsStrip.addEventListener('pointercancel', endCardDrag);

    cardsStrip.addEventListener('click', (e) => {
        if (cardDragMoved) {
            e.preventDefault();
            e.stopPropagation();
            cardDragMoved = false;
            return;
        }
        const card = e.target.closest('.workshop-card');
        if (!card) return;
        const cityName = card.dataset.city;
        if (cityName) selectCity(cityName, { source: 'main' });
    }, true);

    const arrowLeftBtn  = document.getElementById('arrow-left');
    const arrowRightBtn = document.getElementById('arrow-right');

    arrowLeftBtn.addEventListener('click', () => {
        stripVelocity = -STRIP_ARROW_IMPULSE;
    });
    arrowRightBtn.addEventListener('click', () => {
        stripVelocity = STRIP_ARROW_IMPULSE;
    });

    const attrBtn = document.getElementById('attr-btn');
    const attrPopup = document.getElementById('attr-popup');
    attrBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        attrPopup.classList.toggle('show');
    });
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#attr-popup') && !e.target.closest('#attr-btn')) {
            attrPopup.classList.remove('show');
        }
    });
</script>

</body>
</html>
